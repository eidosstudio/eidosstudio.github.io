<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="재고관리">
<title>재고관리</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'Pretendard Variable','Pretendard','Apple SD Gothic Neo',sans-serif;display:flex;flex-direction:column;height:100dvh;transition:background .3s,color .3s}
body.dark{background:#0a0a0f;color:#e2e8f0}
body.light{background:#f5f5f7;color:#111827}
input,textarea{outline:none;font-family:inherit}
button{font-family:inherit;cursor:pointer;border:none}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}
body.dark ::-webkit-scrollbar-thumb{background:#2a2a3e;border-radius:99px}
body.light ::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:99px}

/* 헤더 */
#app-header{padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;flex-shrink:0;backdrop-filter:blur(12px);transition:background .3s,border-color .3s}
body.dark #app-header{background:rgba(10,10,15,0.97);border-bottom:1px solid rgba(255,255,255,0.07)}
body.light #app-header{background:rgba(245,245,247,0.97);border-bottom:1px solid rgba(0,0,0,0.08)}
.logo-box{width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,#3b82f6,#6366f1);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}

/* 다크/라이트 토글 */
.theme-toggle{position:relative;width:52px;height:28px;border-radius:99px;cursor:pointer;transition:background .3s;border:none;flex-shrink:0}
body.dark .theme-toggle{background:#334155}
body.light .theme-toggle{background:#fbbf24}
.theme-knob{position:absolute;top:3px;width:22px;height:22px;border-radius:50%;background:#fff;transition:left .3s;display:flex;align-items:center;justify-content:center;font-size:13px;box-shadow:0 1px 4px rgba(0,0,0,0.25)}
body.dark .theme-knob{left:3px}
body.light .theme-knob{left:27px}

/* 바텀 탭 */
#bottom-nav{display:flex;flex-shrink:0;transition:background .3s,border-color .3s}
body.dark #bottom-nav{background:rgba(10,10,15,0.97);border-top:1px solid rgba(255,255,255,0.07)}
body.light #bottom-nav{background:rgba(245,245,247,0.97);border-top:1px solid rgba(0,0,0,0.08)}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:9px 4px 11px;gap:3px;font-size:10px;font-weight:600;background:transparent;transition:color .15s}
body.dark .nav-btn{color:#475569}
body.light .nav-btn{color:#9ca3af}
.nav-btn.active{color:#6366f1}
.nav-icon{font-size:19px}

/* 탭 콘텐츠 */
#app-body{flex:1;overflow:hidden;display:flex;flex-direction:column}
.tab-pane{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;display:none;flex-direction:column}
.tab-pane.active{display:flex}
.page-scroll{padding:12px 14px;flex:1}

/* 채팅 */
#chat-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
#chat-messages{padding:12px 14px;display:flex;flex-direction:column;gap:12px}
.bubble-wrap{display:flex;flex-direction:column;gap:3px}
.bubble-wrap.user{align-items:flex-end}
.bubble-wrap.ai{align-items:flex-start}
.bubble-user{background:linear-gradient(135deg,#3b82f6,#6366f1);color:#fff;border-radius:18px 18px 4px 18px;padding:11px 14px;max-width:82%;font-size:14px;line-height:1.6;word-break:break-word}
.bubble-ai{border-radius:18px 18px 18px 4px;padding:11px 14px;max-width:85%;font-size:14px;line-height:1.6;white-space:pre-wrap;word-break:break-word}
body.dark .bubble-ai{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);color:#e2e8f0}
body.light .bubble-ai{background:#fff;border:1px solid rgba(0,0,0,0.08);color:#111827}
.bubble-time{font-size:10px;color:#475569;padding:0 4px}
#input-bar{padding:8px 12px;padding-bottom:max(8px,env(safe-area-inset-bottom));flex-shrink:0;transition:background .3s,border-color .3s}
body.dark #input-bar{background:rgba(10,10,15,0.95);border-top:1px solid rgba(255,255,255,0.07)}
body.light #input-bar{background:rgba(245,245,247,0.95);border-top:1px solid rgba(0,0,0,0.08)}
#input-wrap{display:flex;gap:8px;align-items:flex-end;border-radius:20px;padding:8px 8px 8px 14px}
body.dark #input-wrap{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.09)}
body.light #input-wrap{background:#fff;border:1px solid rgba(0,0,0,0.1)}
#msg-input{flex:1;background:transparent;border:none;font-size:15px;line-height:1.5;resize:none;max-height:120px;overflow-y:auto}
body.dark #msg-input{color:#e2e8f0}
body.light #msg-input{color:#111827}
#msg-input::placeholder{color:#94a3b8}
#send-btn{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,#3b82f6,#6366f1);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
#send-btn:active{transform:scale(0.92)}
#send-btn:disabled{opacity:.35}
.qchip{padding:6px 14px;border-radius:99px;font-size:12px;font-weight:500;white-space:nowrap;flex-shrink:0;transition:all .15s}
body.dark .qchip{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.09);color:#94a3b8}
body.light .qchip{background:#fff;border:1px solid rgba(0,0,0,0.1);color:#6b7280}
.dots{display:flex;gap:4px;align-items:center;padding:4px 0}
.dot{width:6px;height:6px;border-radius:50%;background:#60a5fa;animation:pulse 1.2s ease infinite}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}

/* 통계 */
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
.stat-tile{border-radius:12px;padding:13px;transition:background .3s,border-color .3s}
body.dark .stat-tile{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07)}
body.light .stat-tile{background:#fff;border:1px solid rgba(0,0,0,0.08)}
.stat-val{font-size:18px;font-weight:800}
.stat-lbl{font-size:10px;margin-top:2px}
body.dark .stat-lbl{color:#475569}
body.light .stat-lbl{color:#6b7280}

/* 필터 */
.filter-label{font-size:10px;font-weight:600;margin-bottom:5px}
body.dark .filter-label{color:#475569}
body.light .filter-label{color:#6b7280}
.filter-row{display:flex;gap:5px;overflow-x:auto;padding-bottom:4px;margin-bottom:10px;flex-wrap:wrap}
.filter-row::-webkit-scrollbar{display:none}
.fbtn{padding:5px 12px;border-radius:99px;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .15s}
body.dark .fbtn{border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.04);color:#64748b}
body.light .fbtn{border:1px solid rgba(0,0,0,0.1);background:rgba(0,0,0,0.04);color:#6b7280}
.fbtn.on{background:linear-gradient(135deg,#3b82f6,#6366f1);border-color:transparent;color:#fff}

/* 컬렉션 그룹 */
.collection-group{margin-bottom:16px}
.coll-header{display:flex;align-items:center;gap:8px;padding:10px 14px;font-weight:700;font-size:12px;cursor:pointer;user-select:none;transition:all .15s;border-radius:10px 10px 0 0}
body.dark .coll-header{background:rgba(99,102,241,0.08);border:1px solid rgba(99,102,241,0.2)}
body.light .coll-header{background:rgba(99,102,241,0.06);border:1px solid rgba(99,102,241,0.25)}
.coll-header.collapsed{border-radius:10px}
.coll-name{color:#6366f1}
body.light .coll-name{color:#4f46e5}
.coll-count{margin-left:auto;font-size:10px;color:#6366f1}
.coll-arrow{font-size:11px}
body.dark .coll-arrow{color:#475569}
body.light .coll-arrow{color:#9ca3af}
.items-wrap{padding:8px;border-top:none;border-radius:0 0 10px 10px}
body.dark .items-wrap{background:rgba(255,255,255,0.01);border:1px solid rgba(255,255,255,0.07)}
body.light .items-wrap{background:rgba(0,0,0,0.02);border:1px solid rgba(0,0,0,0.08)}
.item-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px}
@media(max-width:900px){.item-grid{grid-template-columns:repeat(4,1fr)}}
@media(max-width:600px){.item-grid{grid-template-columns:repeat(2,1fr)}}

/* 카드 */
.item-card{border-radius:10px;overflow:hidden;display:flex;flex-direction:column;transition:background .3s,border-color .3s}
body.dark .item-card{background:#0f1020;border:1px solid rgba(255,255,255,0.07)}
body.light .item-card{background:#fff;border:1px solid rgba(0,0,0,0.08)}
.item-card.low-stock{border-color:rgba(239,68,68,0.35)!important}
.item-img{width:100%;aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:28px;position:relative;overflow:hidden;cursor:pointer}
body.dark .item-img{background:rgba(255,255,255,0.03)}
body.light .item-img{background:rgba(0,0,0,0.04)}
.item-img img{width:100%;height:100%;object-fit:cover}
.img-hover{position:absolute;inset:0;background:rgba(0,0,0,0.45);display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:0;transition:opacity .2s}
.item-img:hover .img-hover,.item-img:active .img-hover{opacity:1}
.low-mask{position:absolute;inset:0;background:rgba(239,68,68,0.35);pointer-events:none}
.item-body{padding:9px 10px;flex:1;display:flex;flex-direction:column;gap:3px}
.item-name{font-weight:700;font-size:12px;line-height:1.3}
body.dark .item-name{color:#e2e8f0}
body.light .item-name{color:#111827}
.item-material{font-size:9px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
body.dark .item-material{color:#475569}
body.light .item-material{color:#6b7280}
.item-qty{font-size:18px;font-weight:800;margin-top:2px}
.unit{font-size:10px;font-weight:400}
body.dark .unit{color:#475569}
body.light .unit{color:#6b7280}
.item-actions{display:flex;gap:4px;padding:6px 8px;border-top:1px solid rgba(128,128,128,0.1)}
.btn-edit{flex:1;padding:5px 0;border-radius:7px;font-size:10px;font-weight:700;background:rgba(99,102,241,0.15);border:1px solid rgba(99,102,241,0.3);color:#a5b4fc}
.btn-edit-item{flex:1;padding:5px 0;border-radius:7px;font-size:10px;font-weight:700;border:1px solid rgba(128,128,128,0.15);color:#64748b}
body.dark .btn-edit-item{background:rgba(255,255,255,0.04)}
body.light .btn-edit-item{background:rgba(0,0,0,0.04)}
.opts-panel{border-top:1px solid rgba(128,128,128,0.1);padding:6px 10px}
body.dark .opts-panel{background:rgba(0,0,0,0.3)}
body.light .opts-panel{background:rgba(0,0,0,0.03)}
.opt-row{display:flex;align-items:center;gap:6px;padding:6px 0}
.opt-row+.opt-row{border-top:1px solid rgba(128,128,128,0.08)}
.opt-name{flex:1;font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
body.dark .opt-name{color:#94a3b8}
body.light .opt-name{color:#6b7280}
.opt-qty{font-weight:800;font-size:13px;flex-shrink:0}
.opt-unit{font-size:9px;font-weight:400}
body.dark .opt-unit{color:#475569}
body.light .opt-unit{color:#9ca3af}
.btn-opt-edit{padding:3px 9px;border-radius:6px;font-size:10px;font-weight:700;background:rgba(99,102,241,0.15);border:1px solid rgba(99,102,241,0.3);color:#a5b4fc;flex-shrink:0}

/* 포장용품 */
.pack-item{border-radius:10px;overflow:hidden;margin-bottom:8px}
body.dark .pack-item{background:#0f1020;border:1px solid rgba(255,255,255,0.07)}
body.light .pack-item{background:#fff;border:1px solid rgba(0,0,0,0.08)}
.pack-row{display:flex;align-items:center;gap:12px;padding:12px 14px}
.pack-icon{width:38px;height:38px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
body.dark .pack-icon{background:rgba(255,255,255,0.05)}
body.light .pack-icon{background:rgba(0,0,0,0.05)}

/* 모달 */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:flex;align-items:flex-end;justify-content:center;z-index:100}
.modal-sheet{border-radius:20px 20px 0 0;width:100%;max-width:440px;padding:20px 18px;padding-bottom:max(20px,env(safe-area-inset-bottom));max-height:88dvh;overflow-y:auto}
body.dark .modal-sheet{background:#13141f}
body.light .modal-sheet{background:#ffffff}
.modal-handle{width:36px;height:4px;border-radius:2px;margin:0 auto 16px}
body.dark .modal-handle{background:rgba(255,255,255,0.15)}
body.light .modal-handle{background:rgba(0,0,0,0.1)}
.modal-title{font-weight:800;font-size:16px;margin-bottom:14px}
.field-label{font-size:12px;font-weight:600;margin-bottom:5px}
body.dark .field-label{color:#94a3b8}
body.light .field-label{color:#6b7280}
.field-wrap{margin-bottom:12px}
.field-input{width:100%;border-radius:10px;padding:10px 13px;font-size:14px;font-family:inherit}
body.dark .field-input{background:rgba(255,255,255,0.05);border:1.5px solid rgba(255,255,255,0.1);color:#e2e8f0}
body.light .field-input{background:rgba(0,0,0,0.04);border:1.5px solid rgba(0,0,0,0.1);color:#111827}
.field-input:focus{border-color:#6366f1}
.qty-current{font-size:22px;font-weight:800;color:#6366f1;margin-bottom:12px}
.type-row{display:flex;gap:8px;margin-bottom:12px}
.type-btn{flex:1;padding:10px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;border:1.5px solid;transition:all .15s}
.option-tag{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;background:rgba(99,102,241,0.12);border:1px solid rgba(99,102,241,0.25);border-radius:99px;font-size:12px;color:#a5b4fc;margin:3px}
.option-tag button{background:none;color:#6366f1;font-size:14px;line-height:1;padding:0;cursor:pointer;border:none}
.add-opt-row{display:flex;gap:6px;margin-top:6px}
.btn-primary{width:100%;padding:13px;border-radius:12px;background:linear-gradient(135deg,#3b82f6,#6366f1);color:#fff;font-weight:700;font-size:15px;margin-top:6px;cursor:pointer}
.btn-secondary{width:100%;padding:11px;border-radius:12px;font-weight:600;font-size:14px;margin-top:8px;cursor:pointer}
body.dark .btn-secondary{background:rgba(255,255,255,0.06);color:#94a3b8}
body.light .btn-secondary{background:rgba(0,0,0,0.05);color:#6b7280}
.add-fab{position:fixed;bottom:calc(60px + 14px + env(safe-area-inset-bottom));right:16px;width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,#3b82f6,#6366f1);display:none;align-items:center;justify-content:center;font-size:26px;box-shadow:0 4px 20px rgba(59,130,246,0.4);z-index:90;color:#fff;cursor:pointer}
.add-fab.show{display:flex}

/* 내역 */
.tx-item{display:flex;align-items:center;gap:12px;padding:12px 14px;border-top:1px solid rgba(128,128,128,0.08)}
.tx-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}

/* 토스트 */
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);border-radius:12px;padding:10px 20px;font-size:13px;font-weight:600;z-index:200;display:none;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,0.3)}
body.dark #toast{background:rgba(20,20,40,0.97);border:1px solid rgba(255,255,255,0.12);color:#e2e8f0}
body.light #toast{background:#1f2937;border:1px solid rgba(255,255,255,0.1);color:#f9fafb}

/* 로딩 */
#loading{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:999}
body.dark #loading{background:#0a0a0f}
body.light #loading{background:#f5f5f7}
.spinner{width:36px;height:36px;border:3px solid rgba(99,102,241,0.2);border-top-color:#6366f1;border-radius:50%;animation:spin .8s linear infinite}

/* 파일 input */
#photo-input,#file-input{display:none}

@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp .25s ease}
</style>
</head>
<body class="dark">

<div id="loading">
  <div class="spinner"></div>
  <div style="font-size:14px;color:#475569">Firebase 연결 중...</div>
</div>
<div id="toast"></div>
<input id="photo-input" type="file" accept="image/*">
<input id="file-input" type="file" accept=".xlsx,.xls,.csv">

<!-- 상품 추가/수정 모달 -->
<div class="modal-bg" id="item-modal" style="display:none" onclick="if(event.target===this)closeModal('item-modal')">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title" id="item-modal-title">상품 추가</div>
    <input type="hidden" id="m-id">
    <div class="field-wrap"><div class="field-label">연도</div><input class="field-input" id="m-year" placeholder="예: 2025"></div>
    <div class="field-wrap"><div class="field-label">컬렉션명</div><input class="field-input" id="m-coll" placeholder="예: BOLD"></div>
    <div class="field-wrap"><div class="field-label">상품명 *</div><input class="field-input" id="m-name" placeholder="예: PAPER POP"></div>
    <div class="field-wrap"><div class="field-label">재질</div><input class="field-input" id="m-material" placeholder="예: acryl, sus"></div>
    <div class="field-wrap">
      <div class="field-label">옵션 (사이즈·언어 등) — 없으면 비워두세요</div>
      <div id="opt-tags"></div>
      <div class="add-opt-row">
        <input class="field-input" id="opt-input" placeholder="예: 한국어" style="flex:1">
        <button onclick="addOptTag()" style="padding:10px 14px;border-radius:10px;background:rgba(99,102,241,0.15);border:1px solid rgba(99,102,241,0.3);color:#a5b4fc;font-size:13px;font-weight:600">추가</button>
      </div>
    </div>
    <div id="single-qty-wrap" class="field-wrap"><div class="field-label">수량</div><input class="field-input" id="m-qty" type="number" min="0" placeholder="0"></div>
    <div class="field-wrap"><div class="field-label">단위</div><input class="field-input" id="m-unit" placeholder="개"></div>
    <button class="btn-primary" onclick="confirmItemModal()">저장</button>
    <button class="btn-secondary" onclick="closeModal('item-modal')">취소</button>
  </div>
</div>

<!-- 옵션 수량 모달 -->
<div class="modal-bg" id="optqty-modal" style="display:none" onclick="if(event.target===this)closeModal('optqty-modal')">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title" id="optqty-title">옵션별 수량</div>
    <div id="optqty-rows"></div>
    <button class="btn-primary" onclick="saveOptQty()">저장</button>
    <button class="btn-secondary" onclick="closeModal('optqty-modal')">취소</button>
  </div>
</div>

<!-- 수량 수정 모달 -->
<div class="modal-bg" id="qty-modal" style="display:none" onclick="if(event.target===this)closeModal('qty-modal')">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title" id="qty-modal-title">수량 수정</div>
    <div class="qty-current" id="qty-current-val"></div>
    <div class="field-wrap"><div class="field-label">새 수량</div><input class="field-input" id="qty-input" type="number" min="0" placeholder="0" onkeydown="if(event.key==='Enter')confirmQty()"></div>
    <button class="btn-primary" onclick="confirmQty()">저장</button>
    <button class="btn-secondary" onclick="closeModal('qty-modal')">취소</button>
  </div>
</div>

<!-- 포장용품 모달 -->
<div class="modal-bg" id="pack-modal" style="display:none" onclick="if(event.target===this)closeModal('pack-modal')">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">포장용품 추가</div>
    <input type="hidden" id="p-id">
    <div class="field-wrap"><div class="field-label">품목명 *</div><input class="field-input" id="p-name" placeholder="예: 페이퍼백"></div>
    <div class="field-wrap"><div class="field-label">설명</div><input class="field-input" id="p-desc" placeholder="예: 쇼핑백 대형"></div>
    <div class="field-wrap">
      <div class="field-label">옵션 — 없으면 비워두세요</div>
      <div id="pack-opt-tags"></div>
      <div class="add-opt-row">
        <input class="field-input" id="pack-opt-input" placeholder="예: 소, 중, 대" style="flex:1">
        <button onclick="addPackOptTag()" style="padding:10px 14px;border-radius:10px;background:rgba(99,102,241,0.15);border:1px solid rgba(99,102,241,0.3);color:#a5b4fc;font-size:13px;font-weight:600">추가</button>
      </div>
    </div>
    <div id="pack-single-qty-wrap" class="field-wrap"><div class="field-label">수량</div><input class="field-input" id="p-qty" type="number" min="0" placeholder="0"></div>
    <div class="field-wrap"><div class="field-label">단위</div><input class="field-input" id="p-unit" placeholder="개"></div>
    <button class="btn-primary" onclick="confirmPackModal()">저장</button>
    <button class="btn-secondary" onclick="closeModal('pack-modal')">취소</button>
  </div>
</div>

<!-- 포장용품 옵션 수량 -->
<div class="modal-bg" id="packoptqty-modal" style="display:none" onclick="if(event.target===this)closeModal('packoptqty-modal')">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title" id="packoptqty-title">옵션별 수량</div>
    <div id="packoptqty-rows"></div>
    <button class="btn-primary" onclick="savePackOptQty()">저장</button>
    <button class="btn-secondary" onclick="closeModal('packoptqty-modal')">취소</button>
  </div>
</div>

<!-- FAB -->
<button class="add-fab" id="fab-btn" onclick="openFabAction()">＋</button>

<!-- 헤더 -->
<div id="app-header">
  <div style="display:flex;align-items:center;gap:10px">
    <div class="logo-box">📦</div>
    <div>
      <div style="font-weight:800;font-size:14px">재고관리</div>
      <div class="stat-lbl" id="header-sub">연결 중...</div>
    </div>
  </div>
  <button class="theme-toggle" onclick="toggleTheme()">
    <div class="theme-knob" id="theme-knob">🌙</div>
  </button>
</div>

<div id="app-body">
  <!-- 재고 탭 -->
  <div id="tab-stock" class="tab-pane active">
    <div class="page-scroll">
      <div class="stat-row" id="stock-stat-row"></div>
      <div class="filter-label">연도</div>
      <div class="filter-row" id="year-filters"></div>
      <div class="filter-label">컬렉션</div>
      <div class="filter-row" id="coll-filters"></div>
      <div id="stock-groups"></div>
      <div style="height:80px"></div>
    </div>
  </div>

  <!-- 포장용품 탭 -->
  <div id="tab-pack" class="tab-pane">
    <div class="page-scroll">
      <div class="stat-row" id="pack-stat-row"></div>
      <div id="pack-list"></div>
      <div style="height:80px"></div>
    </div>
  </div>

  <!-- 내역 탭 -->
  <div id="tab-history" class="tab-pane">
    <div class="page-scroll">
      <div class="filter-row" id="tx-filters"></div>
      <div id="tx-list" style="border-radius:14px;overflow:hidden" class="stat-tile" style="padding:0"></div>

<!-- 바텀 탭 -->
<div id="bottom-nav">
  <button class="nav-btn active" id="nav-stock" onclick="switchTab('stock')"><span class="nav-icon">📦</span>재고</button>
  <button class="nav-btn" id="nav-pack" onclick="switchTab('pack')"><span class="nav-icon">🛍️</span>포장용품</button>
  <button class="nav-btn" id="nav-history" onclick="switchTab('history')"><span class="nav-icon">📋</span>내역</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, doc, setDoc, addDoc, deleteDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBHWNK9K1Ack5-Sj02PAuVbCu2gcOSnpMY",
  authDomain: "gm-stock-management.firebaseapp.com",
  projectId: "gm-stock-management",
  storageBucket: "gm-stock-management.firebasestorage.app",
  messagingSenderId: "590013505498",
  appId: "1:590013505498:web:59343cee0d152ee97c6ae3"
};
const fbApp = initializeApp(firebaseConfig);
const db = getFirestore(fbApp);

// ── State ──
let items=[], packaging=[], transactions=[];
let filterYear="전체", filterColl="전체", filterTx="전체";
let collapsedGroups=new Set(), showLowOnly=false;
let isDark=true, currentTab="stock", isLoading=false;
let modalOpts=[], packModalOpts=[];
let qtyItemId=null, qtyOptName=null;
let editingOptQtyId=null, editingPackOptQtyId=null;
let photoTargetId=null;

// ── Helpers ──
function totalQty(item){return item.options?.length?item.options.reduce((a,o)=>a+(o.quantity||0),0):item.quantity||0;}
function isLow(item){return totalQty(item)<10;}
function isPackLow(p){return p.options?.length?p.options.some(o=>(o.quantity||0)<10):(p.quantity||0)<10;}
function nowTime(){return new Date().toLocaleTimeString("ko-KR",{hour:"2-digit",minute:"2-digit"});}
function todayDate(){return new Date().toISOString().slice(0,10);}

// ── Toast ──
function showToast(msg,color="#34d399"){
  const t=document.getElementById("toast");
  t.textContent=msg;t.style.color=color;t.style.display="block";
  setTimeout(()=>t.style.display="none",2500);
}

// ── Theme ──
window.toggleTheme=function(){
  isDark=!isDark;
  document.body.className=isDark?"dark":"light";
  document.getElementById("theme-knob").textContent=isDark?"🌙":"☀️";
  renderStock();renderPack();
};

// ── Tab ──
window.switchTab=function(t){
  ["stock","pack","history"].forEach(id=>{
    document.getElementById("tab-"+id).classList.remove("active");
    document.getElementById("nav-"+id).classList.remove("active");
  });
  document.getElementById("tab-"+t).classList.add("active");
  document.getElementById("nav-"+t).classList.add("active");
  currentTab=t;
  document.getElementById("fab-btn").className="add-fab"+(["stock","pack"].includes(t)?" show":"");
  if(t==="history")renderHistory();
};
window.openFabAction=function(){
  if(currentTab==="stock")openItemModal();
  else if(currentTab==="pack")openPackModal();
};

// ── Modal ──
window.closeModal=function(id){document.getElementById(id).style.display="none";};

// ── 상품 모달 ──
window.openItemModal=function(itemId){
  modalOpts=[];
  document.getElementById("m-id").value=itemId||"";
  document.getElementById("item-modal-title").textContent=itemId?"상품 수정":"상품 추가";
  const item=itemId?items.find(i=>i.id===itemId):null;
  document.getElementById("m-year").value=item?.year||"";
  document.getElementById("m-coll").value=item?.collection||"";
  document.getElementById("m-name").value=item?.name||"";
  document.getElementById("m-material").value=item?.material||"";
  document.getElementById("m-unit").value=item?.unit||"개";
  document.getElementById("m-qty").value=item?.quantity||0;
  if(item?.options?.length) modalOpts=item.options.map(o=>({name:o.name,quantity:o.quantity||0}));
  renderOptTags();
  document.getElementById("item-modal").style.display="flex";
};
window.addOptTag=function(){
  const v=document.getElementById("opt-input").value.trim();if(!v)return;
  modalOpts.push({name:v,quantity:0});document.getElementById("opt-input").value="";renderOptTags();
};
window.removeOptTag=function(i){modalOpts.splice(i,1);renderOptTags();};
function renderOptTags(){
  document.getElementById("opt-tags").innerHTML=modalOpts.map((o,i)=>`<span class="option-tag">${o.name}<button onclick="removeOptTag(${i})">×</button></span>`).join("");
  document.getElementById("single-qty-wrap").style.display=modalOpts.length?"none":"block";
}
document.getElementById("opt-input").addEventListener("keydown",e=>{if(e.key==="Enter"){e.preventDefault();window.addOptTag();}});

window.confirmItemModal=async function(){
  const name=document.getElementById("m-name").value.trim();
  if(!name){showToast("상품명을 입력해주세요","#f87171");return;}
  const editId=document.getElementById("m-id").value;
  const base={
    id:editId||"item_"+Date.now(),
    year:document.getElementById("m-year").value.trim()||null,
    collection:document.getElementById("m-coll").value.trim()||null,
    name,material:document.getElementById("m-material").value.trim()||null,
    unit:document.getElementById("m-unit").value.trim()||"개",
    options:modalOpts.length?modalOpts.map(o=>({name:o.name,quantity:o.quantity||0})):null,
    quantity:modalOpts.length?0:(parseInt(document.getElementById("m-qty").value)||0),
    imageUrl:editId?(items.find(i=>i.id===editId)?.imageUrl||null):null
  };
  try{await setDoc(doc(collection(db,"items"),base.id),base);closeModal("item-modal");showToast("저장됐어요 ✅");
    if(base.options?.length)openOptQtyModal(base.id);}
  catch(e){showToast("오류: "+e.message,"#f87171");}
};

// ── 옵션 수량 모달 ──
window.openOptQtyModal=function(itemId){
  editingOptQtyId=itemId;
  const item=items.find(i=>i.id===itemId);if(!item?.options)return;
  document.getElementById("optqty-title").textContent=item.name+" — 옵션별 수량";
  document.getElementById("optqty-rows").innerHTML=item.options.map((o,i)=>`
    <div class="field-wrap"><div class="field-label">${o.name}</div>
    <input class="field-input" id="optqty-${i}" type="number" min="0" value="${o.quantity||0}"></div>`).join("");
  document.getElementById("optqty-modal").style.display="flex";
};
window.saveOptQty=async function(){
  const item=items.find(i=>i.id===editingOptQtyId);if(!item?.options)return;
  item.options.forEach((o,i)=>{const v=parseInt(document.getElementById("optqty-"+i)?.value);if(!isNaN(v))o.quantity=v;});
  const data={...item};if(data.imageUrl?.startsWith("data:"))delete data.imageUrl;
  try{await setDoc(doc(collection(db,"items"),item.id),data);closeModal("optqty-modal");showToast("수량 저장됐어요 ✅");}
  catch(e){showToast("오류: "+e.message,"#f87171");}
};

// ── 수량 수정 모달 ──
window.openQtyModal=function(itemId,optName,itemName,current){
  qtyItemId=itemId;qtyOptName=optName;
  document.getElementById("qty-modal-title").textContent=optName?`${itemName} [${optName}]`:itemName;
  document.getElementById("qty-current-val").textContent=current+"개";
  document.getElementById("qty-input").value=current;
  document.getElementById("qty-modal").style.display="flex";
  setTimeout(()=>document.getElementById("qty-input").focus(),100);
};
window.confirmQty=async function(){
  const val=parseInt(document.getElementById("qty-input").value);
  if(isNaN(val)||val<0){showToast("올바른 수량을 입력해주세요","#f87171");return;}
  const item=items.find(i=>i.id===qtyItemId);if(!item)return;
  const clone=JSON.parse(JSON.stringify(item));
  if(qtyOptName&&clone.options){const o=clone.options.find(x=>x.name===qtyOptName);if(o)o.quantity=val;}
  else clone.quantity=val;
  const data={...clone};if(data.imageUrl?.startsWith("data:"))delete data.imageUrl;
  try{await setDoc(doc(collection(db,"items"),item.id),data);closeModal("qty-modal");showToast("수량 수정됐어요 ✅");}
  catch(e){showToast("오류: "+e.message,"#f87171");}
};

// ── 사진 ──
document.getElementById("photo-input").addEventListener("change",e=>{
  const file=e.target.files[0];if(!file||!photoTargetId)return;
  const reader=new FileReader();
  reader.onload=async ev=>{
    const item=items.find(i=>i.id===photoTargetId);
    if(item){const data={...item,imageUrl:ev.target.result};delete data.imageUrl;data.imageUrl=ev.target.result;
      try{await setDoc(doc(collection(db,"items"),item.id),data);}catch(e){showToast("사진 저장 오류","#f87171");}}
    photoTargetId=null;
  };reader.readAsDataURL(file);e.target.value="";
});
window.openPhotoUpload=function(id){photoTargetId=id;document.getElementById("photo-input").click();};

// ── 포장용품 모달 ──
window.openPackModal=function(packId){
  packModalOpts=[];
  document.getElementById("p-id").value=packId||"";
  const p=packId?packaging.find(x=>x.id===packId):null;
  document.getElementById("p-name").value=p?.name||"";
  document.getElementById("p-desc").value=p?.desc||"";
  document.getElementById("p-unit").value=p?.unit||"개";
  document.getElementById("p-qty").value=p?.quantity||0;
  if(p?.options?.length)packModalOpts=p.options.map(o=>({name:o.name,quantity:o.quantity||0}));
  renderPackOptTags();document.getElementById("pack-modal").style.display="flex";
};
window.addPackOptTag=function(){
  const v=document.getElementById("pack-opt-input").value.trim();if(!v)return;
  packModalOpts.push({name:v,quantity:0});document.getElementById("pack-opt-input").value="";renderPackOptTags();
};
window.removePackOptTag=function(i){packModalOpts.splice(i,1);renderPackOptTags();};
document.getElementById("pack-opt-input").addEventListener("keydown",e=>{if(e.key==="Enter"){e.preventDefault();window.addPackOptTag();}});
function renderPackOptTags(){
  document.getElementById("pack-opt-tags").innerHTML=packModalOpts.map((o,i)=>`<span class="option-tag">${o.name}<button onclick="removePackOptTag(${i})">×</button></span>`).join("");
  document.getElementById("pack-single-qty-wrap").style.display=packModalOpts.length?"none":"block";
}
window.confirmPackModal=async function(){
  const name=document.getElementById("p-name").value.trim();
  if(!name){showToast("품목명을 입력해주세요","#f87171");return;}
  const editId=document.getElementById("p-id").value;
  const base={id:editId||"pack_"+Date.now(),name,desc:document.getElementById("p-desc").value.trim()||null,
    unit:document.getElementById("p-unit").value.trim()||"개",
    options:packModalOpts.length?packModalOpts.map(o=>({name:o.name,quantity:o.quantity||0})):null,
    quantity:packModalOpts.length?0:(parseInt(document.getElementById("p-qty").value)||0)};
  try{await setDoc(doc(collection(db,"packaging"),base.id),base);closeModal("pack-modal");showToast("저장됐어요 ✅");
    if(base.options?.length)openPackOptQtyModal(base.id);}
  catch(e){showToast("오류: "+e.message,"#f87171");}
};
window.openPackOptQtyModal=function(packId){
  editingPackOptQtyId=packId;
  const p=packaging.find(x=>x.id===packId);if(!p?.options)return;
  document.getElementById("packoptqty-title").textContent=p.name+" — 옵션별 수량";
  document.getElementById("packoptqty-rows").innerHTML=p.options.map((o,i)=>`
    <div class="field-wrap"><div class="field-label">${o.name}</div>
    <input class="field-input" id="packoptqty-${i}" type="number" min="0" value="${o.quantity||0}"></div>`).join("");
  document.getElementById("packoptqty-modal").style.display="flex";
};
window.savePackOptQty=async function(){
  const p=packaging.find(x=>x.id===editingPackOptQtyId);if(!p?.options)return;
  p.options.forEach((o,i)=>{const v=parseInt(document.getElementById("packoptqty-"+i)?.value);if(!isNaN(v))o.quantity=v;});
  try{await setDoc(doc(collection(db,"packaging"),p.id),{...p});closeModal("packoptqty-modal");showToast("저장됐어요 ✅");}
  catch(e){showToast("오류: "+e.message,"#f87171");}
};

// ── 필터 ──
window.setFilterYear=function(y){filterYear=y;filterColl="전체";renderStock();};
window.setFilterColl=function(c){filterColl=c;renderStock();};
window.toggleGroup=function(gk){if(collapsedGroups.has(gk))collapsedGroups.delete(gk);else collapsedGroups.add(gk);renderStock();};
window.toggleLowOnly=function(){showLowOnly=!showLowOnly;filterYear="전체";filterColl="전체";renderStock();};
window.setFilterTx=function(f){filterTx=f;renderHistory();};

// ── Firebase 리스너 ──
let firstLoad=true;
onSnapshot(collection(db,"items"),snap=>{
  items=snap.docs.map(d=>({...d.data(),id:d.id}));
  renderStock();
  if(firstLoad){document.getElementById("loading").style.display="none";firstLoad=false;}
  const total=items.reduce((a,i)=>a+totalQty(i),0);
  document.getElementById("header-sub").textContent=`${items.length}종 · ${total.toLocaleString()}개`;
});
onSnapshot(collection(db,"packaging"),snap=>{packaging=snap.docs.map(d=>({...d.data(),id:d.id}));renderPack();});
onSnapshot(query(collection(db,"transactions"),orderBy("createdAt","desc")),snap=>{
  transactions=snap.docs.map(d=>({...d.data(),id:d.id}));
  if(currentTab==="history")renderHistory();
});

// ── Render Stock ──
function renderStock(){
  const total=items.reduce((a,i)=>a+totalQty(i),0),low=items.filter(isLow);
  const years=[...new Set(items.map(i=>String(i.year||"")).filter(Boolean))].sort().reverse();
  const byYear=filterYear==="전체"?items:items.filter(i=>String(i.year||"")==filterYear);
  const colls=[...new Set(byYear.map(i=>i.collection).filter(Boolean))];
  const activeColl=colls.includes(filterColl)?filterColl:"전체";

  document.getElementById("stock-stat-row").innerHTML=[
    {l:"전체 상품",v:items.length+"종",c:"#3b82f6",click:false},
    {l:"총 수량",v:total.toLocaleString(),c:"#8b5cf6",click:false},
    {l:"컬렉션",v:colls.length+"개",c:"#10b981",click:false},
    {l:"재고 부족",v:low.length+"종",c:low.length>0?"#ef4444":"#6b7280",click:true},
  ].map(s=>`<div class="stat-tile" style="cursor:${s.click?"pointer":"default"}" ${s.click?'onclick="toggleLowOnly()"':""}>
    <div class="stat-val" style="color:${s.c}">${s.v}</div>
    <div class="stat-lbl">${s.l}${s.click&&showLowOnly?" ✓":""}</div></div>`).join("");

  document.getElementById("year-filters").innerHTML=["전체",...years].map(y=>
    `<button class="fbtn ${filterYear===y?"on":""}" onclick="setFilterYear('${y}')">${y}</button>`).join("");
  document.getElementById("coll-filters").innerHTML=["전체",...colls].map(c=>
    `<button class="fbtn ${activeColl===c?"on":""}" onclick="setFilterColl('${c}')">${c}</button>`).join("");

  const filtered=items.filter(i=>
    (showLowOnly?isLow(i):true)&&
    (filterYear==="전체"||String(i.year||"")==filterYear)&&
    (activeColl==="전체"||i.collection===activeColl)
  );
  const grouped={};
  filtered.forEach(item=>{
    const k=[item.year,item.collection].filter(Boolean).join(" - ")||"미분류";
    if(!grouped[k])grouped[k]=[];grouped[k].push(item);
  });

  if(!Object.keys(grouped).length){
    document.getElementById("stock-groups").innerHTML=`<div style="text-align:center;padding:50px;font-size:14px;color:#475569">+ 버튼으로 상품을 추가하거나<br>상품을 등록해 주세요</div>`;return;
  }

  document.getElementById("stock-groups").innerHTML=Object.entries(grouped).map(([gk,gitems])=>{
    const isCollapsed=collapsedGroups.has(gk);
    const gTotal=gitems.reduce((a,i)=>a+totalQty(i),0);
    const safeGk=gk.replace(/'/g,"\\'");
    const cards=gitems.map(item=>{
      const low=isLow(item),qty=totalQty(item),hasOpts=item.options?.length;
      const nm=item.name.replace(/'/g,"\\'").replace(/"/g,"&quot;");
      const optRows=hasOpts?item.options.map(o=>{
        const oLow=(o.quantity||0)<10;
        const on=o.name.replace(/'/g,"\\'").replace(/"/g,"&quot;");
        return `<div class="opt-row">
          <span class="opt-name">${o.name}</span>
          ${oLow?`<span style="font-size:9px;flex-shrink:0">🔴</span>`:""}
          <span class="opt-qty" style="color:${oLow?"#ef4444":(isDark?"#e2e8f0":"#111827")}">${o.quantity||0}<span class="opt-unit"> ${item.unit||"개"}</span></span>
          <button class="btn-opt-edit" onclick="openQtyModal('${item.id}','${on}','${nm}',${o.quantity||0})">수정</button>
        </div>`;
      }).join(""):"";
      return `<div class="item-card${low?" low-stock":""}">
        <div class="item-img" onclick="openPhotoUpload('${item.id}')">
          ${item.imageUrl?`<img src="${item.imageUrl}" alt="${item.name}">`:`<span style="opacity:.2">📷</span>`}
          ${low?`<div class="low-mask"></div>`:""}
          <div class="img-hover"><span style="font-size:16px">📷</span><span style="font-size:9px;color:#fff;margin-top:2px">${item.imageUrl?"변경":"추가"}</span></div>
        </div>
        <div class="item-body">
          <div class="item-name">${item.name}</div>
          ${item.material?`<div class="item-material">${item.material}</div>`:""}
          <div class="item-qty" style="color:${low?"#ef4444":(isDark?"#e2e8f0":"#111827")}">${qty}<span class="unit"> ${item.unit||"개"}</span></div>
        </div>
        ${!hasOpts?`<div class="item-actions">
          <button class="btn-edit" onclick="openQtyModal('${item.id}',null,'${nm}',${qty})">수량 수정</button>
          <button class="btn-edit-item" onclick="openItemModal('${item.id}')">편집</button>
        </div>`:`<div class="opts-panel">${optRows}</div>`}
      </div>`;
    }).join("");
    return `<div class="collection-group">
      <div class="coll-header${isCollapsed?" collapsed":""}" onclick="toggleGroup('${safeGk}')">
        <span>${isCollapsed?"📁":"🗂️"}</span>
        <span class="coll-name">${gk}</span>
        <span class="coll-count">${gitems.length}종 · ${gTotal.toLocaleString()}개</span>
        <span class="coll-arrow">${isCollapsed?"▶":"▼"}</span>
      </div>
      ${!isCollapsed?`<div class="items-wrap"><div class="item-grid">${cards}</div></div>`:""}
    </div>`;
  }).join("");
}

// ── Render Pack ──
function renderPack(){
  const total=packaging.reduce((a,p)=>a+(p.options?p.options.reduce((b,o)=>b+(o.quantity||0),0):p.quantity||0),0);
  const low=packaging.filter(isPackLow);
  document.getElementById("pack-stat-row").innerHTML=[
    {l:"포장용품 종류",v:packaging.length+"종",c:"#3b82f6"},
    {l:"총 수량",v:total.toLocaleString(),c:"#8b5cf6"},
    {l:"재고 부족",v:low.length+"종",c:low.length>0?"#ef4444":"#6b7280"},
    {l:"",v:"",c:""},
  ].map(s=>s.l?`<div class="stat-tile"><div class="stat-val" style="color:${s.c}">${s.v}</div><div class="stat-lbl">${s.l}</div></div>`:`<div></div>`).join("");
  const list=document.getElementById("pack-list");
  if(!packaging.length){list.innerHTML=`<div style="text-align:center;padding:48px;font-size:14px;color:#475569">+ 버튼으로 포장용품을 추가해보세요</div>`;return;}
  list.innerHTML=packaging.map(p=>{
    const hasOpts=p.options?.length,low=isPackLow(p);
    const qty=hasOpts?p.options.reduce((a,o)=>a+(o.quantity||0),0):p.quantity||0;
    const pn=p.name.replace(/'/g,"\\'").replace(/"/g,"&quot;");
    const optRows=hasOpts?p.options.map(o=>{
      const oLow=(o.quantity||0)<10;
      const on=o.name.replace(/'/g,"\\'").replace(/"/g,"&quot;");
      return `<div class="opt-row">
        <span class="opt-name">${o.name}</span>
        ${oLow?`<span style="font-size:9px;flex-shrink:0">🔴</span>`:""}
        <span class="opt-qty" style="color:${oLow?"#ef4444":(isDark?"#e2e8f0":"#111827")}">${o.quantity||0}<span class="opt-unit"> ${p.unit||"개"}</span></span>
        <button class="btn-opt-edit" onclick="openQtyModal('${p.id}','${on}','${pn}',${o.quantity||0})">수정</button>
      </div>`;
    }).join(""):"";
    return `<div class="pack-item">
      <div class="pack-row">
        <div class="pack-icon">🛍️</div>
        <div style="flex:1;min-width:0">
          <div style="font-weight:700;font-size:14px;display:flex;align-items:center;gap:6px">
            ${p.name}${low?`<span style="padding:1px 6px;border-radius:99px;font-size:9px;background:rgba(239,68,68,0.15);color:#ef4444;border:1px solid rgba(239,68,68,0.3)">🔴 발주필요</span>`:""}
          </div>
          ${p.desc?`<div style="font-size:11px;color:#475569;margin-top:2px">${p.desc}</div>`:""}
        </div>
        <div style="text-align:right;display:flex;flex-direction:column;align-items:flex-end;gap:4px">
          <div style="font-size:16px;font-weight:800;color:${low?"#ef4444":(isDark?"#e2e8f0":"#111827")}">${qty}<span class="unit"> ${p.unit||"개"}</span></div>
          <div style="display:flex;gap:4px">
            ${!hasOpts?`<button class="btn-edit" onclick="openQtyModal('${p.id}',null,'${pn}',${qty})" style="padding:3px 9px;font-size:10px">수정</button>`:""}
            <button class="btn-edit-item" onclick="openPackModal('${p.id}')" style="padding:3px 9px;font-size:10px">편집</button>
          </div>
        </div>
      </div>
      ${hasOpts?`<div class="opts-panel">${optRows}</div>`:""}
    </div>`;
  }).join("");
}

// ── Render History ──
function renderHistory(){
  document.getElementById("tx-filters").innerHTML=["전체","입고","출고"].map(f=>
    `<button class="fbtn ${filterTx===f?"on":""}" onclick="setFilterTx('${f}')">${f}</button>`).join("");
  const filtered=transactions.filter(t=>filterTx==="전체"||t.type===filterTx);
  const list=document.getElementById("tx-list");
  if(!filtered.length){list.innerHTML=`<div style="padding:40px;text-align:center;font-size:14px;color:#475569">입출고 내역이 없습니다.</div>`;return;}
  list.innerHTML=filtered.map(t=>`
    <div class="tx-item">
      <div class="tx-icon" style="background:${t.type==="입고"?"rgba(52,211,153,0.12)":"rgba(248,113,113,0.12)"}">
        ${t.type==="입고"?"📥":"📤"}
      </div>
      <div style="flex:1;min-width:0">
        <div style="font-weight:600;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${t.itemName||""}${t.optionName?` [${t.optionName}]`:""}</div>
        <div style="font-size:11px;color:#475569;margin-top:2px">${t.collection?`<span style="padding:1px 6px;border-radius:99px;font-size:10px;background:rgba(139,92,246,0.12);color:#a78bfa;margin-right:4px">${t.collection}</span>`:""}${t.destination||""} · ${t.date||""} ${t.time||""}</div>
      </div>
      <div style="font-weight:700;font-size:15px;color:${t.type==="입고"?"#34d399":"#f87171"};flex-shrink:0">${t.type==="입고"?"+":"-"}${t.quantity}${t.unit||""}</div>
    </div>`).join("");
}

</script>
</body>
</html>
