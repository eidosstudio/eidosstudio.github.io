<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="재고관리">
<meta name="theme-color" content="#0a0a0f">
<title>재고관리</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'Pretendard Variable','Pretendard',sans-serif;background:#0a0a0f;color:#e2e8f0;display:flex;flex-direction:column;height:100dvh}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#2a2a3e;border-radius:99px}
input,textarea,select{outline:none;font-family:inherit}
button{font-family:inherit;cursor:pointer;border:none}
.chip{display:inline-block;padding:2px 9px;border-radius:99px;font-size:11px;font-weight:600}
.chip-violet{background:rgba(139,92,246,0.12);color:#a78bfa}
.chip-green{background:rgba(52,211,153,0.12);color:#34d399}
.chip-red{background:rgba(248,113,113,0.18);color:#f87171}
.chip-order{background:rgba(239,68,68,0.18);color:#ef4444;border:1px solid rgba(239,68,68,0.3)}
/* Header */
#app-header{padding:12px 16px;display:flex;align-items:center;justify-content:space-between;background:rgba(10,10,15,0.95);backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,0.06);flex-shrink:0}
.logo-box{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,#3b82f6,#6366f1);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
/* Bottom nav */
#bottom-nav{display:flex;background:rgba(10,10,15,0.97);backdrop-filter:blur(16px);border-top:1px solid rgba(255,255,255,0.06);flex-shrink:0}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:9px 4px 11px;gap:3px;font-size:10px;font-weight:600;color:#475569;transition:all .15s;background:transparent}
.nav-btn.active{color:#6366f1}
.nav-btn .nav-icon{font-size:19px}
/* Body */
#app-body{flex:1;overflow:hidden;display:flex;flex-direction:column}
.tab-content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;display:none}
.tab-content.active{display:block}
.page-body{padding:14px}
/* Stats */
.stat-row{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:16px}
.stat-tile{border-radius:14px;padding:16px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07)}
.stat-val{font-size:22px;font-weight:800}
.stat-lbl{font-size:11px;color:#475569;margin-top:2px}
/* Filters */
.filter-row{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px;margin-bottom:10px}
.filter-row::-webkit-scrollbar{display:none}
.fbtn{padding:5px 13px;border-radius:99px;font-size:12px;font-weight:600;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.04);color:#64748b;white-space:nowrap;flex-shrink:0}
.fbtn.on{background:linear-gradient(135deg,#3b82f6,#6366f1);border-color:transparent;color:#fff}
/* Collection */
.collection-group{margin-bottom:20px}
.coll-header{display:flex;align-items:center;gap:8px;padding:10px 14px;background:rgba(99,102,241,0.08);border:1px solid rgba(99,102,241,0.2);border-radius:12px 12px 0 0;font-weight:700;font-size:13px}
.item-list{border:1px solid rgba(255,255,255,0.06);border-top:none;border-radius:0 0 12px 12px;overflow:hidden}
/* Item row */
.item-row{background:#0f1020;border-top:1px solid rgba(255,255,255,0.04)}
.item-row-header{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer;transition:background .15s}
.item-row-header:active{background:rgba(255,255,255,0.03)}
.item-img-thumb{width:44px;height:44px;border-radius:8px;background:rgba(255,255,255,0.04);display:flex;align-items:center;justify-content:center;font-size:20px;overflow:hidden;flex-shrink:0;position:relative}
.item-img-thumb img{width:100%;height:100%;object-fit:cover;border-radius:8px}
.item-main-info{flex:1;min-width:0}
.item-name{font-weight:700;font-size:14px}
.item-meta{font-size:11px;color:#64748b;margin-top:2px}
.item-total-qty{font-size:16px;font-weight:800;flex-shrink:0;text-align:right}
/* Options */
.options-panel{display:none;background:rgba(0,0,0,0.3);border-top:1px solid rgba(255,255,255,0.05)}
.options-panel.open{display:block}
.option-row{display:flex;align-items:center;gap:8px;padding:9px 14px 9px 22px;border-top:1px solid rgba(255,255,255,0.04)}
.opt-name{flex:1;font-size:13px;color:#94a3b8}
/* Low stock */
.low-overlay{position:absolute;inset:0;border-radius:8px;background:rgba(239,68,68,0.25);display:flex;align-items:center;justify-content:center}
.low-overlay span{font-size:9px;font-weight:800;color:#fff;background:rgba(239,68,68,0.9);padding:2px 5px;border-radius:4px}
#low-banner{background:rgba(239,68,68,0.1);border-bottom:1px solid rgba(239,68,68,0.2);padding:7px 14px;font-size:12px;display:none;align-items:center;gap:6px;flex-wrap:wrap;flex-shrink:0}
/* Qty edit inline */
.qty-edit-row{display:flex;align-items:center;gap:4px}
.qty-input{width:60px;background:rgba(59,130,246,0.1);border:1.5px solid #3b82f6;border-radius:8px;color:#e2e8f0;padding:3px 7px;font-size:14px;font-weight:800}
.qty-save{padding:3px 9px;border-radius:7px;background:linear-gradient(135deg,#3b82f6,#6366f1);color:#fff;font-size:11px;font-weight:700}
.qty-cancel{padding:3px 8px;border-radius:7px;background:rgba(255,255,255,0.07);color:#64748b;font-size:11px}
/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;display:none;align-items:flex-end;justify-content:center}
.modal-overlay.open{display:flex}
.modal-sheet{background:#13141f;border-radius:20px 20px 0 0;width:100%;max-width:500px;max-height:88dvh;overflow-y:auto;padding:20px 18px;padding-bottom:max(20px,env(safe-area-inset-bottom))}
.modal-handle{width:40px;height:4px;border-radius:2px;background:rgba(255,255,255,0.15);margin:0 auto 18px}
.modal-title{font-weight:800;font-size:17px;margin-bottom:18px}
.field-label{font-size:12px;color:#94a3b8;font-weight:600;margin-bottom:5px}
.field-wrap{margin-bottom:13px}
.field-input{width:100%;background:rgba(255,255,255,0.05);border:1.5px solid rgba(255,255,255,0.1);border-radius:10px;color:#e2e8f0;padding:10px 13px;font-size:14px}
.field-input:focus{border-color:#6366f1}
.primary-btn{width:100%;padding:13px;border-radius:12px;background:linear-gradient(135deg,#3b82f6,#6366f1);color:#fff;font-weight:700;font-size:15px;margin-top:6px}
.secondary-btn{width:100%;padding:11px;border-radius:12px;background:rgba(255,255,255,0.06);color:#94a3b8;font-weight:600;font-size:14px;margin-top:8px}
/* IO Modal type btn */
.type-btn{flex:1;padding:10px;font-size:14px;font-weight:700;border-radius:8px;transition:all .15s}
/* Toast */
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(30,30,50,0.97);border:1px solid rgba(255,255,255,0.12);border-radius:12px;padding:11px 20px;font-size:13px;font-weight:600;color:#e2e8f0;z-index:999;display:none;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,0.4)}
/* TX */
.tx-item{display:flex;align-items:center;gap:12px;padding:12px 14px;border-top:1px solid rgba(255,255,255,0.04)}
/* Loading */
#loading{position:fixed;inset:0;background:#0a0a0f;z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
.spinner{width:36px;height:36px;border:3px solid rgba(99,102,241,0.2);border-top-color:#6366f1;border-radius:50%;animation:spin .8s linear infinite}
/* Packaging */
.pack-item{background:#0f1020;border-top:1px solid rgba(255,255,255,0.05)}
/* Card grid */
.item-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;padding:10px;background:rgba(255,255,255,0.01);border:1px solid rgba(255,255,255,0.06);border-top:none;border-radius:0 0 12px 12px}
@media(min-width:600px){.item-grid{grid-template-columns:repeat(4,1fr)}}
@media(min-width:900px){.item-grid{grid-template-columns:repeat(6,1fr)}}
.item-card{background:#0f1020;border:1px solid rgba(255,255,255,0.07);border-radius:12px;overflow:hidden;display:flex;flex-direction:column;transition:border-color .15s}
.item-card:active{border-color:rgba(99,102,241,0.4)}
.item-card-img{width:100%;aspect-ratio:1;background:rgba(255,255,255,0.03);display:flex;align-items:center;justify-content:center;font-size:32px;position:relative;overflow:hidden}
.item-card-img img{width:100%;height:100%;object-fit:cover}
.item-card-body{padding:10px;flex:1;display:flex;flex-direction:column;gap:4px}
.item-card-name{font-weight:700;font-size:13px;line-height:1.3}
.item-card-meta{font-size:10px;color:#475569}
.item-card-qty{font-size:20px;font-weight:800;margin-top:4px}
.item-card-opts{background:rgba(0,0,0,0.25);border-top:1px solid rgba(255,255,255,0.05);padding:8px 10px;display:none}
.item-card-opts.open{display:block}
.opt-card-row{display:flex;align-items:center;gap:6px;padding:5px 0;border-top:1px solid rgba(255,255,255,0.04);font-size:12px}
.opt-card-row:first-child{border-top:none}
.opt-card-name{flex:1;color:#94a3b8}
.opt-card-qty{font-weight:800;font-size:13px}
.item-card-actions{display:flex;gap:4px;padding:8px 10px;border-top:1px solid rgba(255,255,255,0.05)}
.act-btn{flex:1;padding:6px 0;border-radius:8px;font-size:11px;font-weight:700;text-align:center}
.act-btn-io{background:rgba(99,102,241,0.15);border:1px solid rgba(99,102,241,0.3);color:#a5b4fc}
.act-btn-qty{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);color:#64748b}
/* 연도별 컬렉션 필터 연동 */
.coll-filter-wrap{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px;margin-bottom:10px}
.coll-filter-wrap::-webkit-scrollbar{display:none}
/* FAB */
.add-fab{position:fixed;bottom:calc(64px + 14px + env(safe-area-inset-bottom));right:16px;width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,#3b82f6,#6366f1);display:none;align-items:center;justify-content:center;font-size:26px;box-shadow:0 4px 20px rgba(59,130,246,0.4);z-index:100;color:#fff}
.add-fab.show{display:flex}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp .25s ease}
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <div style="color:#64748b;font-size:14px">재고 데이터 불러오는 중...</div>
</div>

<div id="toast"></div>

<!-- 입출고 모달 -->
<div class="modal-overlay" id="io-modal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title" id="io-modal-title">입출고 등록</div>
    <div class="field-wrap">
      <div style="display:flex;gap:8px">
        <button id="btn-in" class="type-btn" onclick="setIOType('입고')" style="background:rgba(52,211,153,0.15);color:#34d399;border:1.5px solid #34d399">📥 입고</button>
        <button id="btn-out" class="type-btn" onclick="setIOType('출고')" style="background:rgba(255,255,255,0.05);color:#64748b;border:1.5px solid rgba(255,255,255,0.1)">📤 출고</button>
      </div>
    </div>
    <div class="field-wrap"><div class="field-label">수량 *</div><input class="field-input" id="io-qty" type="number" min="1" placeholder="0"></div>
    <div class="field-wrap"><div class="field-label" id="io-dest-label">출고처</div><input class="field-input" id="io-dest" placeholder="예: 신세계 강남점"></div>
    <div id="io-preview" style="display:none;padding:10px 14px;border-radius:10px;font-size:13px;margin-bottom:8px"></div>
    <button class="primary-btn" onclick="confirmIO()">등록하기</button>
    <button class="secondary-btn" onclick="closeModal('io-modal')">취소</button>
  </div>
</div>

<!-- 수량 직접 수정 모달 -->
<div class="modal-overlay" id="qty-modal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title" id="qty-modal-title">수량 수정</div>
    <div class="field-wrap"><div class="field-label">현재 수량</div><div id="qty-current" style="font-size:22px;font-weight:800;color:#6366f1;margin-bottom:12px"></div></div>
    <div class="field-wrap"><div class="field-label">새 수량 *</div><input class="field-input" id="qty-new" type="number" min="0" placeholder="0"></div>
    <button class="primary-btn" onclick="confirmQty()">저장</button>
    <button class="secondary-btn" onclick="closeModal('qty-modal')">취소</button>
  </div>
</div>

<!-- 포장용품 입출고 모달 -->
<div class="modal-overlay" id="pack-io-modal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">포장용품 입출고</div>
    <div class="field-wrap">
      <div style="display:flex;gap:8px">
        <button id="pack-btn-in" class="type-btn" onclick="setPackIOType('입고')" style="background:rgba(52,211,153,0.15);color:#34d399;border:1.5px solid #34d399">📥 입고</button>
        <button id="pack-btn-out" class="type-btn" onclick="setPackIOType('출고')" style="background:rgba(255,255,255,0.05);color:#64748b;border:1.5px solid rgba(255,255,255,0.1)">📤 출고</button>
      </div>
    </div>
    <div class="field-wrap"><div class="field-label">수량 *</div><input class="field-input" id="pack-io-qty" type="number" min="1" placeholder="0"></div>
    <div class="field-wrap"><div class="field-label" id="pack-io-dest-label">출고처</div><input class="field-input" id="pack-io-dest" placeholder="예: 신세계 강남점"></div>
    <button class="primary-btn" onclick="confirmPackIO()">등록하기</button>
    <button class="secondary-btn" onclick="closeModal('pack-io-modal')">취소</button>
  </div>
</div>

<input id="photo-input" type="file" accept="image/*" style="display:none">

<!-- FAB -->
<button class="add-fab" id="fab-btn" onclick="openFabAction()">＋</button>

<!-- Header -->
<div id="app-header">
  <div style="display:flex;align-items:center;gap:10px">
    <div class="logo-box">📦</div>
    <div>
      <div style="font-weight:800;font-size:15px">재고관리</div>
      <div style="font-size:11px;color:#475569;display:flex;align-items:center;gap:5px">
        <span id="status-dot" style="width:6px;height:6px;border-radius:50%;background:#f87171;display:inline-block"></span>
        <span id="status-text">연결 중...</span>
      </div>
    </div>
  </div>
  <button onclick="location.reload()" style="padding:7px 12px;border-radius:10px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);color:#64748b;font-size:13px">↻ 새로고침</button>
</div>

<div id="low-banner"></div>

<div id="app-body">
  <!-- STOCK -->
  <div id="tab-stock" class="tab-content active">
    <div class="page-body">
      <div class="stat-row" id="stock-stat-row"></div>
      <div style="font-size:11px;color:#475569;font-weight:600;margin-bottom:6px">연도</div>
      <div class="filter-row" id="year-filters"></div>
      <div style="font-size:11px;color:#475569;font-weight:600;margin-bottom:6px">컬렉션</div>
      <div class="filter-row" id="collection-filters"></div>
      <div id="stock-groups"></div>
      <div style="height:80px"></div>
    </div>
  </div>

  <!-- PACKAGING -->
  <div id="tab-pack" class="tab-content">
    <div class="page-body">
      <div class="stat-row" id="pack-stat-row"></div>
      <div id="pack-list" style="background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:14px;overflow:hidden"></div>
      <div style="height:80px"></div>
    </div>
  </div>

  <!-- HISTORY -->
  <div id="tab-history" class="tab-content">
    <div class="page-body">
      <div class="filter-row" id="tx-filters"></div>
      <div style="background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:14px;overflow:hidden" id="tx-list"></div>
    </div>
  </div>
</div>

<div id="bottom-nav">
  <button class="nav-btn active" id="nav-stock" onclick="switchTab('stock')"><span class="nav-icon">📦</span>재고</button>
  <button class="nav-btn" id="nav-pack" onclick="switchTab('pack')"><span class="nav-icon">🛍️</span>포장용품</button>
  <button class="nav-btn" id="nav-history" onclick="switchTab('history')"><span class="nav-icon">📋</span>내역</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, doc, setDoc, addDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBHWNK9K1Ack5-Sj02PAuVbCu2gcOSnpMY",
  authDomain: "gm-stock-management.firebaseapp.com",
  projectId: "gm-stock-management",
  storageBucket: "gm-stock-management.firebasestorage.app",
  messagingSenderId: "590013505498",
  appId: "1:590013505498:web:59343cee0d152ee97c6ae3"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ── State ──
let items=[], packaging=[], transactions=[];
let filterYear="전체", filterCollection="전체", filterTx="전체";
let expandedItems=new Set();
let currentTab="stock";
// 입출고 모달 state
let ioItemId=null, ioOptName=null, ioType="출고";
let qtyItemId=null, qtyOptName=null;
let packIOId=null, packIOOptName=null, packIOType="출고";

// ── Helpers ──
function totalQty(item){
  if(!item.options||item.options.length===0) return item.quantity||0;
  return item.options.reduce((a,o)=>a+(o.quantity||0),0);
}
function isLow(item){return totalQty(item)<10;}
function isPackLow(p){
  if(!p.options||p.options.length===0) return (p.quantity||0)<10;
  return p.options.some(o=>(o.quantity||0)<10);
}
function nowTime(){return new Date().toLocaleTimeString("ko-KR",{hour:"2-digit",minute:"2-digit"});}
function todayDate(){return new Date().toISOString().slice(0,10);}

// ── Toast ──
function showToast(msg, color="#34d399"){
  const t=document.getElementById("toast");
  t.textContent=msg; t.style.display="block"; t.style.color=color;
  setTimeout(()=>t.style.display="none",2500);
}

// ── Modal ──
function openModal(id){document.getElementById(id).classList.add("open");}
function closeModal(id){document.getElementById(id).classList.remove("open");}
window.closeModal=closeModal;
document.querySelectorAll(".modal-overlay").forEach(m=>{m.addEventListener("click",e=>{if(e.target===m)m.classList.remove("open");});});

// ── Tab ──
function switchTab(t){
  ["stock","pack","history"].forEach(id=>{
    document.getElementById("tab-"+id).classList.remove("active");
    document.getElementById("nav-"+id).classList.remove("active");
  });
  document.getElementById("tab-"+t).classList.add("active");
  document.getElementById("nav-"+t).classList.add("active");
  currentTab=t;
  document.getElementById("fab-btn").className="add-fab"+((t==="stock"||t==="pack")?" show":"");
}
window.switchTab=switchTab;

function openFabAction(){
  if(currentTab==="stock") showToast("수정할 상품을 탭하세요 👆","#60a5fa");
  else if(currentTab==="pack") showToast("수정할 포장용품을 탭하세요 👆","#60a5fa");
}
window.openFabAction=openFabAction;

// ── 입출고 모달 ──
function openIOModal(itemId, optName, itemName){
  ioItemId=itemId; ioOptName=optName; ioType="출고";
  document.getElementById("io-modal-title").textContent=(optName?`${itemName} [${optName}]`:itemName)+" 입출고";
  document.getElementById("io-qty").value="";
  document.getElementById("io-dest").value="";
  document.getElementById("io-preview").style.display="none";
  setIOType("출고");
  openModal("io-modal");
}
window.openIOModal=openIOModal;

function setIOType(t){
  ioType=t;
  const inBtn=document.getElementById("btn-in");
  const outBtn=document.getElementById("btn-out");
  if(t==="입고"){
    inBtn.style.cssText="flex:1;padding:10px;font-size:14px;font-weight:700;border-radius:8px;background:rgba(52,211,153,0.2);color:#34d399;border:1.5px solid #34d399";
    outBtn.style.cssText="flex:1;padding:10px;font-size:14px;font-weight:700;border-radius:8px;background:rgba(255,255,255,0.05);color:#64748b;border:1.5px solid rgba(255,255,255,0.1)";
    document.getElementById("io-dest-label").textContent="입고처";
    document.getElementById("io-dest").placeholder="예: 제조사, 공급업체";
  } else {
    outBtn.style.cssText="flex:1;padding:10px;font-size:14px;font-weight:700;border-radius:8px;background:rgba(248,113,113,0.2);color:#f87171;border:1.5px solid #f87171";
    inBtn.style.cssText="flex:1;padding:10px;font-size:14px;font-weight:700;border-radius:8px;background:rgba(255,255,255,0.05);color:#64748b;border:1.5px solid rgba(255,255,255,0.1)";
    document.getElementById("io-dest-label").textContent="출고처";
    document.getElementById("io-dest").placeholder="예: 신세계 강남점";
  }
}
window.setIOType=setIOType;

async function confirmIO(){
  const qty=parseInt(document.getElementById("io-qty").value);
  const dest=document.getElementById("io-dest").value.trim()||"-";
  if(!qty||qty<=0){showToast("수량을 입력해주세요","#f87171");return;}
  const item=items.find(i=>i.id===ioItemId);
  if(!item){showToast("상품을 찾을 수 없어요","#f87171");return;}

  let curQty, opt;
  if(ioOptName&&item.options){opt=item.options.find(o=>o.name===ioOptName);curQty=opt?.quantity||0;}
  else curQty=item.quantity||0;

  if(ioType==="출고"&&curQty<qty){showToast(`재고 부족! 현재 ${curQty}${item.unit}`,"#f87171");return;}

  const newQty=ioType==="입고"?curQty+qty:curQty-qty;
  if(opt) opt.quantity=newQty; else item.quantity=newQty;

  // Firebase 저장
  const itemData={...item}; if(itemData.imageUrl&&itemData.imageUrl.startsWith("data:")) delete itemData.imageUrl;
  await setDoc(doc(collection(db,"items"),item.id),itemData);
  await addDoc(collection(db,"transactions"),{
    itemId:item.id,itemName:item.name,optionName:ioOptName||null,
    collection:item.collection,unit:item.unit,type:ioType,quantity:qty,
    destination:dest,date:todayDate(),time:nowTime(),createdAt:serverTimestamp()
  });

  closeModal("io-modal");
  showToast(`${ioType} 완료! 잔여 ${newQty}${item.unit}`);
}
window.confirmIO=confirmIO;

// ── 수량 직접 수정 ──
function openQtyModal(itemId,optName,itemName,current){
  qtyItemId=itemId; qtyOptName=optName;
  document.getElementById("qty-modal-title").textContent=(optName?`${itemName} [${optName}]`:itemName);
  document.getElementById("qty-current").textContent=current;
  document.getElementById("qty-new").value=current;
  openModal("qty-modal");
}
window.openQtyModal=openQtyModal;

async function confirmQty(){
  const val=parseInt(document.getElementById("qty-new").value);
  if(isNaN(val)||val<0){showToast("올바른 수량을 입력해주세요","#f87171");return;}
  const item=items.find(i=>i.id===qtyItemId);
  if(!item) return;
  if(qtyOptName&&item.options){const o=item.options.find(x=>x.name===qtyOptName);if(o)o.quantity=val;}
  else item.quantity=val;
  const itemData={...item}; if(itemData.imageUrl&&itemData.imageUrl.startsWith("data:")) delete itemData.imageUrl;
  await setDoc(doc(collection(db,"items"),item.id),itemData);
  closeModal("qty-modal");
  showToast("수량이 수정됐어요 ✅");
}
window.confirmQty=confirmQty;

// ── 포장용품 입출고 ──
function openPackIOModal(packId,optName,packName){
  packIOId=packId; packIOOptName=optName; packIOType="출고";
  document.getElementById("pack-io-qty").value="";
  document.getElementById("pack-io-dest").value="";
  setPackIOType("출고");
  openModal("pack-io-modal");
}
window.openPackIOModal=openPackIOModal;

function setPackIOType(t){
  packIOType=t;
  const inBtn=document.getElementById("pack-btn-in");
  const outBtn=document.getElementById("pack-btn-out");
  if(t==="입고"){
    inBtn.style.cssText="flex:1;padding:10px;font-size:14px;font-weight:700;border-radius:8px;background:rgba(52,211,153,0.2);color:#34d399;border:1.5px solid #34d399";
    outBtn.style.cssText="flex:1;padding:10px;font-size:14px;font-weight:700;border-radius:8px;background:rgba(255,255,255,0.05);color:#64748b;border:1.5px solid rgba(255,255,255,0.1)";
    document.getElementById("pack-io-dest-label").textContent="입고처";
    document.getElementById("pack-io-dest").placeholder="예: 공급업체";
  } else {
    outBtn.style.cssText="flex:1;padding:10px;font-size:14px;font-weight:700;border-radius:8px;background:rgba(248,113,113,0.2);color:#f87171;border:1.5px solid #f87171";
    inBtn.style.cssText="flex:1;padding:10px;font-size:14px;font-weight:700;border-radius:8px;background:rgba(255,255,255,0.05);color:#64748b;border:1.5px solid rgba(255,255,255,0.1)";
    document.getElementById("pack-io-dest-label").textContent="출고처";
    document.getElementById("pack-io-dest").placeholder="예: 신세계 강남점";
  }
}
window.setPackIOType=setPackIOType;

async function confirmPackIO(){
  const qty=parseInt(document.getElementById("pack-io-qty").value);
  const dest=document.getElementById("pack-io-dest").value.trim()||"-";
  if(!qty||qty<=0){showToast("수량을 입력해주세요","#f87171");return;}
  const p=packaging.find(x=>x.id===packIOId);
  if(!p) return;
  let curQty,opt;
  if(packIOOptName&&p.options){opt=p.options.find(o=>o.name===packIOOptName);curQty=opt?.quantity||0;}
  else curQty=p.quantity||0;
  if(packIOType==="출고"&&curQty<qty){showToast(`재고 부족! 현재 ${curQty}${p.unit}`,"#f87171");return;}
  const newQty=packIOType==="입고"?curQty+qty:curQty-qty;
  if(opt)opt.quantity=newQty; else p.quantity=newQty;
  await setDoc(doc(collection(db,"packaging"),p.id),{...p});
  await addDoc(collection(db,"transactions"),{
    itemId:p.id,itemName:p.name,optionName:packIOOptName||null,
    collection:"포장용품",unit:p.unit,type:packIOType,quantity:qty,
    destination:dest,date:todayDate(),time:nowTime(),createdAt:serverTimestamp()
  });
  closeModal("pack-io-modal");
  showToast(`${packIOType} 완료! 잔여 ${newQty}${p.unit}`);
}
window.confirmPackIO=confirmPackIO;

// ── Firebase 실시간 리스너 ──
let firstLoad=true;
onSnapshot(collection(db,"items"),snap=>{
  items=snap.docs.map(d=>({...d.data(),id:d.id}));
  renderStock();renderBanner();
  if(firstLoad){document.getElementById("loading").style.display="none";firstLoad=false;}
  document.getElementById("status-dot").style.background="#34d399";
  document.getElementById("status-text").textContent=`${items.length}종 · ${items.reduce((a,i)=>a+totalQty(i),0).toLocaleString()}개`;
},err=>{document.getElementById("loading").style.display="none";document.getElementById("status-text").textContent="연결 오류";});

onSnapshot(collection(db,"packaging"),snap=>{
  packaging=snap.docs.map(d=>({...d.data(),id:d.id}));
  renderPack();renderBanner();
});

onSnapshot(query(collection(db,"transactions"),orderBy("createdAt","desc")),snap=>{
  transactions=snap.docs.map(d=>({...d.data(),id:d.id}));
  if(currentTab==="history")renderHistory();
});

// ── Render ──
function renderBanner(){
  const low=items.filter(isLow);const lowP=packaging.filter(isPackLow);const all=[...low,...lowP];
  const banner=document.getElementById("low-banner");
  if(all.length>0){
    banner.style.display="flex";
    banner.innerHTML=`<span style="color:#ef4444;font-weight:700">🔴 발주 필요:</span> `
      +low.slice(0,4).map(i=>`<span style="color:#fca5a5">${i.name}(${totalQty(i)}${i.unit})</span>`).join(" ")
      +(all.length>4?`<span style="color:#ef4444">외 ${all.length-4}개</span>`:"");
  } else banner.style.display="none";
}

function toggleExpand(id){if(expandedItems.has(id))expandedItems.delete(id);else expandedItems.add(id);renderStock();}
window.toggleExpand=toggleExpand;
function togglePackExpand(id){if(expandedItems.has("p_"+id))expandedItems.delete("p_"+id);else expandedItems.add("p_"+id);renderPack();}
window.togglePackExpand=togglePackExpand;

function setFilterYear(y){filterYear=y;filterCollection="전체";renderStock();}
function setFilterCollection(c){filterCollection=c;renderStock();}
window.setFilterYear=setFilterYear;
window.setFilterCollection=setFilterCollection;
function renderStock(){
  const total=items.reduce((a,i)=>a+totalQty(i),0);
  const low=items.filter(isLow);
  const years=[...new Set(items.map(i=>i.year).filter(Boolean))];
  const cols=[...new Set(items.map(i=>i.collection).filter(Boolean))];

  document.getElementById("stock-stat-row").innerHTML=[
    {lbl:"전체 상품",val:items.length+"종",c:"#60a5fa"},
    {lbl:"총 수량",val:total.toLocaleString(),c:"#a78bfa"},
    {lbl:"컬렉션 수",val:cols.length+"개",c:"#34d399"},
    {lbl:"재고 부족",val:low.length+"종",c:low.length>0?"#ef4444":"#64748b"},
  ].map(s=>`<div class="stat-tile"><div class="stat-val" style="color:${s.c}">${s.val}</div><div class="stat-lbl">${s.lbl}</div></div>`).join("");

  document.getElementById("year-filters").innerHTML=["전체",...years].map(y=>
    `<button class="fbtn ${filterYear===y?"on":""}" onclick="filterYear='${y}';renderStock()">${y}</button>`).join("");
  document.getElementById("collection-filters").innerHTML=["전체",...cols].map(c=>
    `<button class="fbtn ${filterCollection===c?"on":""}" onclick="filterCollection='${c}';renderStock()">${c}</button>`).join("");

  window.renderStock=renderStock;

  const filtered=items.filter(i=>(filterYear==="전체"||i.year==filterYear)&&(filterCollection==="전체"||i.collection===filterCollection));
  const grouped={};
  filtered.forEach(item=>{
    const k=[item.year,item.collection].filter(Boolean).join(" - ")||"미분류";
    if(!grouped[k])grouped[k]=[];grouped[k].push(item);
  });

  if(Object.keys(grouped).length===0){
    document.getElementById("stock-groups").innerHTML=`<div style="text-align:center;color:#334155;padding:50px;font-size:14px">데이터를 불러오는 중...</div>`;return;
  }

  document.getElementById("stock-groups").innerHTML=Object.entries(grouped).map(([gk,gitems])=>`
    <div class="collection-group fade-up">
      <div class="coll-header">
        <span>🗂️</span><span style="color:#a5b4fc">${gk}</span>
        <span style="margin-left:auto;font-size:11px;color:#6366f1">${gitems.length}종 · ${gitems.reduce((a,i)=>a+totalQty(i),0).toLocaleString()}개</span>
      </div>
      <div class="item-list">
        ${gitems.map(item=>{
          const low=isLow(item);const expanded=expandedItems.has(item.id);
          const hasOpts=item.options&&item.options.length>0;const qty=totalQty(item);
          return `<div class="item-row">
            <div class="item-row-header" onclick="${hasOpts?`toggleExpand('${item.id}')`:``}">
              <div class="item-img-thumb">
                ${item.imageUrl?`<img src="${item.imageUrl}">`:`<span style="font-size:20px;opacity:.2">📷</span>`}
                ${low?`<div class="low-overlay"><span>발주필요</span></div>`:""}
              </div>
              <div class="item-main-info">
                <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
                  <span class="item-name">${item.name}</span>
                  ${low?`<span class="chip chip-order" style="font-size:10px">🔴 발주필요</span>`:""}
                </div>
                <div class="item-meta">${[item.material].filter(Boolean).join(" · ")}</div>
                ${hasOpts?`<div style="font-size:11px;color:#475569;margin-top:2px">${item.options.map(o=>`${o.name}: ${o.quantity||0}${item.unit}`).join(" | ")}</div>`:""}
              </div>
              <div style="text-align:right;display:flex;flex-direction:column;align-items:flex-end;gap:4px">
                <div class="item-total-qty" style="color:${low?"#ef4444":"#e2e8f0"}">${qty}<span style="font-size:11px;color:#475569;font-weight:400"> ${item.unit||"개"}</span></div>
                ${!hasOpts?`<button onclick="event.stopPropagation();openIOModal('${item.id}',null,'${item.name.replace(/'/g,"\\'")}');return false" style="padding:3px 9px;border-radius:7px;background:rgba(99,102,241,0.12);border:1px solid rgba(99,102,241,0.25);color:#a5b4fc;font-size:11px;font-weight:600">입출고</button>
                <button onclick="event.stopPropagation();openQtyModal('${item.id}',null,'${item.name.replace(/'/g,"\\'")}',${qty});return false" style="padding:3px 9px;border-radius:7px;background:rgba(255,255,255,0.06);color:#64748b;font-size:11px">수정</button>`:
                `<div style="font-size:12px;color:#475569">${expanded?"▲":"▼"}</div>`}
              </div>
            </div>
            ${hasOpts?`<div class="options-panel ${expanded?"open":""}">
              ${item.options.map(o=>{
                const oLow=(o.quantity||0)<10;
                return `<div class="option-row">
                  <span class="opt-name">${o.name}</span>
                  ${oLow?`<span class="chip chip-order" style="font-size:10px">🔴</span>`:""}
                  <span style="font-size:15px;font-weight:800;color:${oLow?"#ef4444":"#e2e8f0"}">${o.quantity||0}</span>
                  <span style="font-size:11px;color:#475569">${item.unit||"개"}</span>
                  <button onclick="openIOModal('${item.id}','${o.name}','${item.name.replace(/'/g,"\\'")}');return false" style="padding:3px 9px;border-radius:7px;background:rgba(99,102,241,0.12);border:1px solid rgba(99,102,241,0.25);color:#a5b4fc;font-size:11px;font-weight:600">입출고</button>
                  <button onclick="openQtyModal('${item.id}','${o.name}','${item.name.replace(/'/g,"\\'")} [${o.name}]',${o.quantity||0});return false" style="padding:3px 9px;border-radius:7px;background:rgba(255,255,255,0.06);color:#64748b;font-size:11px">수정</button>
                </div>`;
              }).join("")}
            </div>`:""}
          </div>`;
        }).join("")}
      </div>
    </div>`).join("");
}

function renderPack(){
  const total=packaging.reduce((a,p)=>{if(!p.options||p.options.length===0)return a+(p.quantity||0);return a+p.options.reduce((b,o)=>b+(o.quantity||0),0);},0);
  const low=packaging.filter(isPackLow);
  document.getElementById("pack-stat-row").innerHTML=[
    {lbl:"포장용품 종류",val:packaging.length+"종",c:"#60a5fa"},
    {lbl:"총 수량",val:total.toLocaleString(),c:"#a78bfa"},
    {lbl:"재고 부족",val:low.length+"종",c:low.length>0?"#ef4444":"#64748b"},
    {lbl:"",val:"",c:""},
  ].map(s=>s.lbl?`<div class="stat-tile"><div class="stat-val" style="color:${s.c}">${s.val}</div><div class="stat-lbl">${s.lbl}</div></div>`:`<div></div>`).join("");

  const list=document.getElementById("pack-list");
  if(packaging.length===0){list.innerHTML=`<div style="padding:40px;text-align:center;color:#334155;font-size:14px">관리자가 포장용품을 등록하면 여기에 표시돼요</div>`;return;}
  list.innerHTML=packaging.map(p=>{
    const hasOpts=p.options&&p.options.length>0;
    const low=isPackLow(p);const expanded=expandedItems.has("p_"+p.id);
    const qty=hasOpts?p.options.reduce((a,o)=>a+(o.quantity||0),0):p.quantity||0;
    return `<div class="pack-item">
      <div class="item-row-header" onclick="${hasOpts?`togglePackExpand('${p.id}')`:``}">
        <div style="width:38px;height:38px;border-radius:8px;background:rgba(255,255,255,0.04);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0">🛍️</div>
        <div class="item-main-info">
          <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
            <span class="item-name">${p.name}</span>
            ${low?`<span class="chip chip-order" style="font-size:10px">🔴 발주필요</span>`:""}
          </div>
          ${p.desc?`<div class="item-meta">${p.desc}</div>`:""}
          ${hasOpts?`<div style="font-size:11px;color:#475569;margin-top:2px">${p.options.map(o=>`${o.name}: ${o.quantity||0}${p.unit}`).join(" | ")}</div>`:""}
        </div>
        <div style="text-align:right;display:flex;flex-direction:column;align-items:flex-end;gap:4px">
          <div class="item-total-qty" style="color:${low?"#ef4444":"#e2e8f0"}">${qty}<span style="font-size:11px;color:#475569;font-weight:400"> ${p.unit||"개"}</span></div>
          ${!hasOpts?`<button onclick="event.stopPropagation();openPackIOModal('${p.id}',null,'${p.name.replace(/'/g,"\\'")}');return false" style="padding:3px 9px;border-radius:7px;background:rgba(99,102,241,0.12);border:1px solid rgba(99,102,241,0.25);color:#a5b4fc;font-size:11px;font-weight:600">입출고</button>
          <button onclick="event.stopPropagation();openQtyModal('${p.id}',null,'${p.name.replace(/'/g,"\\'")}',${qty});return false" style="padding:3px 9px;border-radius:7px;background:rgba(255,255,255,0.06);color:#64748b;font-size:11px">수정</button>`:
          `<div style="font-size:12px;color:#475569">${expanded?"▲":"▼"}</div>`}
        </div>
      </div>
      ${hasOpts?`<div class="options-panel ${expanded?"open":""}">
        ${p.options.map(o=>{const oLow=(o.quantity||0)<10;return`<div class="option-row">
          <span class="opt-name">${o.name}</span>
          ${oLow?`<span class="chip chip-order" style="font-size:10px">🔴</span>`:""}
          <span style="font-size:15px;font-weight:800;color:${oLow?"#ef4444":"#e2e8f0"}">${o.quantity||0}</span>
          <span style="font-size:11px;color:#475569">${p.unit||"개"}</span>
          <button onclick="openPackIOModal('${p.id}','${o.name}','${p.name.replace(/'/g,"\\'")}');return false" style="padding:3px 9px;border-radius:7px;background:rgba(99,102,241,0.12);border:1px solid rgba(99,102,241,0.25);color:#a5b4fc;font-size:11px;font-weight:600">입출고</button>
          <button onclick="openQtyModal('${p.id}','${o.name}','${p.name.replace(/'/g,"\\'")} [${o.name}]',${o.quantity||0});return false" style="padding:3px 9px;border-radius:7px;background:rgba(255,255,255,0.06);color:#64748b;font-size:11px">수정</button>
        </div>`;}).join("")}
      </div>`:""}
    </div>`;
  }).join("");
}

function renderHistory(){
  window.filterTx=filterTx; window.renderHistory=renderHistory;
  document.getElementById("tx-filters").innerHTML=["전체","입고","출고"].map(f=>
    `<button class="fbtn ${filterTx===f?"on":""}" onclick="filterTx='${f}';renderHistory()">${f}</button>`).join("");
  const filtered=transactions.filter(t=>filterTx==="전체"||t.type===filterTx);
  const list=document.getElementById("tx-list");
  if(filtered.length===0){list.innerHTML=`<div style="padding:40px;text-align:center;color:#334155;font-size:14px">입출고 내역이 없습니다.</div>`;return;}
  list.innerHTML=filtered.map(t=>`
    <div class="tx-item">
      <div style="width:36px;height:36px;border-radius:10px;background:${t.type==="입고"?"rgba(52,211,153,0.12)":"rgba(248,113,113,0.12)"};display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0">
        ${t.type==="입고"?"📥":"📤"}
      </div>
      <div style="flex:1;min-width:0">
        <div style="font-weight:600;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${t.itemName||""}${t.optionName?` [${t.optionName}]`:""}</div>
        <div style="font-size:11px;color:#475569;margin-top:2px">${t.collection?`<span class="chip chip-violet" style="margin-right:4px">${t.collection}</span>`:""}${t.destination||""} · ${t.date||""} ${t.time||""}</div>
      </div>
      <div style="font-weight:700;font-size:15px;color:${t.type==="입고"?"#34d399":"#f87171"};flex-shrink:0">${t.type==="입고"?"+":"-"}${t.quantity}${t.unit||""}</div>
      <span class="chip ${t.type==="입고"?"chip-green":"chip-red"}" style="flex-shrink:0">${t.type}</span>
    </div>`).join("");
}
</script>
