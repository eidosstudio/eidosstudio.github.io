<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="재고관리">
<meta name="theme-color" content="#0a0a0f">
<title>재고관리 (관리자)</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'Pretendard Variable','Pretendard',sans-serif;background:#0a0a0f;color:#e2e8f0;display:flex;flex-direction:column;height:100dvh}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#2a2a3e;border-radius:99px}
input,textarea,select{outline:none;font-family:inherit}
button{font-family:inherit;cursor:pointer;border:none}
.chip{display:inline-block;padding:2px 9px;border-radius:99px;font-size:11px;font-weight:600}
.chip-violet{background:rgba(139,92,246,0.12);color:#a78bfa}
.chip-green{background:rgba(52,211,153,0.12);color:#34d399}
.chip-red{background:rgba(248,113,113,0.18);color:#f87171}
.chip-order{background:rgba(239,68,68,0.18);color:#ef4444;border:1px solid rgba(239,68,68,0.3)}
#app-header{padding:12px 16px;display:flex;align-items:center;justify-content:space-between;background:rgba(10,10,15,0.95);backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,0.06);flex-shrink:0}
.logo-box{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,#3b82f6,#6366f1);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
#bottom-nav{display:flex;background:rgba(10,10,15,0.97);backdrop-filter:blur(16px);border-top:1px solid rgba(255,255,255,0.06);flex-shrink:0}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:9px 4px 11px;gap:3px;font-size:10px;font-weight:600;color:#475569;transition:all .15s;background:transparent}
.nav-btn.active{color:#6366f1}
.nav-btn .nav-icon{font-size:19px}
#app-body{flex:1;overflow:hidden;display:flex;flex-direction:column}
.tab-content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;display:none}
.tab-content.active{display:flex;flex-direction:column}
/* Chat */
#chat-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
#chat-messages{padding:12px 14px;display:flex;flex-direction:column;gap:12px}
.bubble-wrap{display:flex;flex-direction:column;gap:3px}
.bubble-wrap.user{align-items:flex-end}
.bubble-wrap.ai{align-items:flex-start}
.bubble-user{background:linear-gradient(135deg,#3b82f6,#6366f1);color:#fff;border-radius:18px 18px 4px 18px;padding:11px 14px;max-width:82%;font-size:14px;line-height:1.6;word-break:break-word}
.bubble-ai{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:18px 18px 18px 4px;padding:11px 14px;max-width:85%;font-size:14px;line-height:1.6;white-space:pre-wrap;word-break:break-word}
.bubble-time{font-size:10px;color:#334155;padding:0 4px}
#input-bar{padding:8px 12px;padding-bottom:max(8px,env(safe-area-inset-bottom));background:rgba(10,10,15,0.95);border-top:1px solid rgba(255,255,255,0.06);flex-shrink:0}
#input-wrap{display:flex;gap:8px;align-items:flex-end;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:20px;padding:8px 8px 8px 14px}
#msg-input{flex:1;background:transparent;border:none;color:#e2e8f0;font-size:15px;line-height:1.5;resize:none;max-height:120px;overflow-y:auto}
#msg-input::placeholder{color:#334155}
#send-btn{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,#3b82f6,#6366f1);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
#send-btn:active{transform:scale(0.92)}
#send-btn:disabled{opacity:.35}
#quick-chips{display:flex;gap:6px;overflow-x:auto;padding:8px 14px 2px;-webkit-overflow-scrolling:touch}
#quick-chips::-webkit-scrollbar{display:none}
.qchip{padding:6px 14px;border-radius:99px;font-size:12px;font-weight:500;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.09);color:#94a3b8;white-space:nowrap;flex-shrink:0}
.qchip:active{background:rgba(59,130,246,0.15);color:#60a5fa}
/* Stock */
.page-body{padding:14px;overflow-y:auto;flex:1}
.stat-row{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:16px}
.stat-tile{border-radius:14px;padding:16px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07)}
.stat-val{font-size:22px;font-weight:800}
.stat-lbl{font-size:11px;color:#475569;margin-top:2px}
.filter-row{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px;margin-bottom:10px}
.filter-row::-webkit-scrollbar{display:none}
.fbtn{padding:5px 13px;border-radius:99px;font-size:12px;font-weight:600;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.04);color:#64748b;white-space:nowrap;flex-shrink:0}
.fbtn.on{background:linear-gradient(135deg,#3b82f6,#6366f1);border-color:transparent;color:#fff}
.collection-group{margin-bottom:20px}
.coll-header{display:flex;align-items:center;gap:8px;padding:10px 14px;background:rgba(99,102,241,0.08);border:1px solid rgba(99,102,241,0.2);border-radius:12px 12px 0 0;font-weight:700;font-size:13px}
.item-list{border:1px solid rgba(255,255,255,0.06);border-top:none;border-radius:0 0 12px 12px;overflow:hidden}
.item-row{background:#0f1020;border-top:1px solid rgba(255,255,255,0.04)}
.item-row-header{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer}
.item-img-thumb{width:44px;height:44px;border-radius:8px;background:rgba(255,255,255,0.04);display:flex;align-items:center;justify-content:center;font-size:20px;overflow:hidden;flex-shrink:0;position:relative}
.item-img-thumb img{width:100%;height:100%;object-fit:cover;border-radius:8px}
.item-main-info{flex:1;min-width:0}
.item-name{font-weight:700;font-size:14px}
.item-meta{font-size:11px;color:#64748b;margin-top:2px}
.item-total-qty{font-size:16px;font-weight:800;flex-shrink:0;text-align:right}
.options-panel{display:none;background:rgba(0,0,0,0.3);border-top:1px solid rgba(255,255,255,0.05)}
.options-panel.open{display:block}
.option-row{display:flex;align-items:center;gap:8px;padding:9px 14px 9px 22px;border-top:1px solid rgba(255,255,255,0.04)}
.opt-name{flex:1;font-size:13px;color:#94a3b8}
.low-overlay{position:absolute;inset:0;border-radius:8px;background:rgba(239,68,68,0.25);display:flex;align-items:center;justify-content:center}
.low-overlay span{font-size:9px;font-weight:800;color:#fff;background:rgba(239,68,68,0.9);padding:2px 5px;border-radius:4px}
#low-banner{background:rgba(239,68,68,0.1);border-bottom:1px solid rgba(239,68,68,0.2);padding:7px 14px;font-size:12px;display:none;align-items:center;gap:6px;flex-wrap:wrap;flex-shrink:0}
/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;display:none;align-items:flex-end;justify-content:center}
.modal-overlay.open{display:flex}
.modal-sheet{background:#13141f;border-radius:20px 20px 0 0;width:100%;max-width:500px;max-height:88dvh;overflow-y:auto;padding:20px 18px;padding-bottom:max(20px,env(safe-area-inset-bottom))}
.modal-handle{width:40px;height:4px;border-radius:2px;background:rgba(255,255,255,0.15);margin:0 auto 18px}
.modal-title{font-weight:800;font-size:17px;margin-bottom:18px}
.field-label{font-size:12px;color:#94a3b8;font-weight:600;margin-bottom:5px}
.field-wrap{margin-bottom:13px}
.field-input{width:100%;background:rgba(255,255,255,0.05);border:1.5px solid rgba(255,255,255,0.1);border-radius:10px;color:#e2e8f0;padding:10px 13px;font-size:14px}
.field-input:focus{border-color:#6366f1}
.option-tag{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;background:rgba(99,102,241,0.12);border:1px solid rgba(99,102,241,0.25);border-radius:99px;font-size:12px;color:#a5b4fc;margin:3px}
.option-tag button{background:none;color:#6366f1;font-size:14px;line-height:1;padding:0}
.add-opt-row{display:flex;gap:6px;margin-top:6px}
.primary-btn{width:100%;padding:13px;border-radius:12px;background:linear-gradient(135deg,#3b82f6,#6366f1);color:#fff;font-weight:700;font-size:15px;margin-top:6px}
.secondary-btn{width:100%;padding:11px;border-radius:12px;background:rgba(255,255,255,0.06);color:#94a3b8;font-weight:600;font-size:14px;margin-top:8px}
.type-btn{flex:1;padding:10px;font-size:14px;font-weight:700;border-radius:8px;transition:all .15s}
.add-fab{position:fixed;bottom:calc(64px + 14px + env(safe-area-inset-bottom));right:16px;width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,#3b82f6,#6366f1);display:none;align-items:center;justify-content:center;font-size:26px;box-shadow:0 4px 20px rgba(59,130,246,0.4);z-index:100;color:#fff}
.add-fab.show{display:flex}
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(30,30,50,0.97);border:1px solid rgba(255,255,255,0.12);border-radius:12px;padding:11px 20px;font-size:13px;font-weight:600;color:#e2e8f0;z-index:999;display:none;white-space:nowrap}
.tx-item{display:flex;align-items:center;gap:12px;padding:12px 14px;border-top:1px solid rgba(255,255,255,0.04)}
.pack-item{background:#0f1020;border-top:1px solid rgba(255,255,255,0.05)}
.item-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;padding:10px;background:rgba(255,255,255,0.01);border:1px solid rgba(255,255,255,0.06);border-top:none;border-radius:0 0 12px 12px}
@media(min-width:600px){.item-grid{grid-template-columns:repeat(4,1fr)}}
@media(min-width:900px){.item-grid{grid-template-columns:repeat(6,1fr)}}
.item-card{background:#0f1020;border:1px solid rgba(255,255,255,0.07);border-radius:12px;overflow:hidden;display:flex;flex-direction:column;transition:border-color .15s}
.item-card:active{border-color:rgba(99,102,241,0.4)}
.item-card-img{width:100%;aspect-ratio:1;background:rgba(255,255,255,0.03);display:flex;align-items:center;justify-content:center;font-size:32px;position:relative;overflow:hidden;cursor:pointer}
.item-card-img img{width:100%;height:100%;object-fit:cover}
.item-card-img-overlay{position:absolute;inset:0;background:rgba(0,0,0,0.45);display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:0;transition:opacity .2s}
.item-card-img:hover .item-card-img-overlay,.item-card-img:active .item-card-img-overlay{opacity:1}
.item-card-body{padding:10px;flex:1;display:flex;flex-direction:column;gap:4px}
.item-card-name{font-weight:700;font-size:13px;line-height:1.3}
.item-card-meta{font-size:10px;color:#475569}
.item-card-qty{font-size:20px;font-weight:800;margin-top:4px}
.item-card-opts{background:rgba(0,0,0,0.25);border-top:1px solid rgba(255,255,255,0.05);padding:8px 10px;display:none}
.item-card-opts.open{display:block}
.opt-card-row{display:flex;align-items:center;gap:5px;padding:5px 0;border-top:1px solid rgba(255,255,255,0.04);font-size:12px}
.opt-card-row:first-child{border-top:none}
.opt-card-name{flex:1;color:#94a3b8;font-size:11px}
.opt-card-qty{font-weight:800;font-size:13px}
.item-card-actions{display:flex;gap:4px;padding:8px 10px;border-top:1px solid rgba(255,255,255,0.05)}
.act-btn{flex:1;padding:6px 0;border-radius:8px;font-size:11px;font-weight:700;text-align:center;cursor:pointer;border:none}
.act-btn-io{background:rgba(99,102,241,0.15);border:1px solid rgba(99,102,241,0.3) !important;color:#a5b4fc}
.act-btn-qty{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1) !important;color:#64748b}
.act-btn-edit{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08) !important;color:#475569}
#loading-overlay{position:fixed;inset:0;background:#0a0a0f;z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
.spinner{width:36px;height:36px;border:3px solid rgba(99,102,241,0.2);border-top-color:#6366f1;border-radius:50%;animation:spin .8s linear infinite}
/* Typing dots */
.dots{display:flex;gap:4px;align-items:center;padding:4px 0}
.dot{width:6px;height:6px;border-radius:50%;background:#60a5fa;animation:pulse 1.2s ease infinite}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp .25s ease}
</style>
</head>
<body>

<div id="loading-overlay">
  <div class="spinner"></div>
  <div style="color:#64748b;font-size:14px">Firebase 연결 중...</div>
</div>

<div id="toast"></div>

<!-- 상품 추가/수정 모달 -->
<div class="modal-overlay" id="item-modal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title" id="item-modal-title">상품 추가</div>
    <input type="hidden" id="modal-edit-id">
    <div class="field-wrap"><div class="field-label">연도</div><input class="field-input" id="m-year" placeholder="예: 2025"></div>
    <div class="field-wrap"><div class="field-label">컬렉션명</div><input class="field-input" id="m-coll" placeholder="예: 볼드 컬렉션"></div>
    <div class="field-wrap"><div class="field-label">상품명 *</div><input class="field-input" id="m-name" placeholder="예: 아크릴 가이드"></div>
    <div class="field-wrap"><div class="field-label">재질</div><input class="field-input" id="m-material" placeholder="예: 아크릴, 종이"></div>
    <div class="field-wrap">
      <div class="field-label">옵션 (사이즈·언어 등) — 없으면 비워두세요</div>
      <div id="opt-tags"></div>
      <div class="add-opt-row">
        <input class="field-input" id="opt-input" placeholder="예: 500mm 1홀" style="flex:1">
        <button onclick="addOptionTag()" style="padding:10px 14px;border-radius:10px;background:rgba(99,102,241,0.15);border:1px solid rgba(99,102,241,0.3);color:#a5b4fc;font-size:13px;font-weight:600">추가</button>
      </div>
    </div>
    <div class="field-wrap" id="single-qty-wrap">
      <div class="field-label">수량</div>
      <input class="field-input" id="m-qty" type="number" min="0" placeholder="0">
    </div>
    <div class="field-wrap"><div class="field-label">단위</div><input class="field-input" id="m-unit" placeholder="개"></div>
    <button class="primary-btn" onclick="confirmItemModal()">저장</button>
    <button class="secondary-btn" onclick="closeModal('item-modal')">취소</button>
  </div>
</div>

<!-- 옵션별 수량 모달 -->
<div class="modal-overlay" id="optqty-modal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title" id="optqty-title">옵션별 수량 설정</div>
    <div id="optqty-rows"></div>
    <button class="primary-btn" onclick="saveOptQty()">저장</button>
    <button class="secondary-btn" onclick="closeModal('optqty-modal')">취소</button>
  </div>
</div>

<!-- 입출고 모달 -->
<div class="modal-overlay" id="io-modal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title" id="io-modal-title">입출고 등록</div>
    <div class="field-wrap">
      <div style="display:flex;gap:8px">
        <button id="btn-in" class="type-btn" onclick="setIOType('입고')" style="background:rgba(52,211,153,0.15);color:#34d399;border:1.5px solid #34d399">📥 입고</button>
        <button id="btn-out" class="type-btn" onclick="setIOType('출고')" style="background:rgba(255,255,255,0.05);color:#64748b;border:1.5px solid rgba(255,255,255,0.1)">📤 출고</button>
      </div>
    </div>
    <div class="field-wrap"><div class="field-label">수량 *</div><input class="field-input" id="io-qty" type="number" min="1" placeholder="0"></div>
    <div class="field-wrap"><div class="field-label" id="io-dest-label">출고처</div><input class="field-input" id="io-dest" placeholder="예: 신세계 강남점"></div>
    <button class="primary-btn" onclick="confirmIO()">등록하기</button>
    <button class="secondary-btn" onclick="closeModal('io-modal')">취소</button>
  </div>
</div>

<!-- 수량 직접 수정 모달 -->
<div class="modal-overlay" id="qty-modal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title" id="qty-modal-title">수량 수정</div>
    <div class="field-wrap"><div class="field-label">현재 수량</div><div id="qty-current" style="font-size:22px;font-weight:800;color:#6366f1;margin-bottom:12px"></div></div>
    <div class="field-wrap"><div class="field-label">새 수량 *</div><input class="field-input" id="qty-new" type="number" min="0" placeholder="0"></div>
    <button class="primary-btn" onclick="confirmQty()">저장</button>
    <button class="secondary-btn" onclick="closeModal('qty-modal')">취소</button>
  </div>
</div>

<!-- 포장용품 모달 -->
<div class="modal-overlay" id="pack-modal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">포장용품 추가</div>
    <input type="hidden" id="pack-edit-id">
    <div class="field-wrap"><div class="field-label">품목명 *</div><input class="field-input" id="p-name" placeholder="예: 페이퍼백"></div>
    <div class="field-wrap"><div class="field-label">설명</div><input class="field-input" id="p-desc" placeholder="예: 쇼핑백 대형"></div>
    <div class="field-wrap">
      <div class="field-label">옵션 — 없으면 비워두세요</div>
      <div id="pack-opt-tags"></div>
      <div class="add-opt-row">
        <input class="field-input" id="pack-opt-input" placeholder="예: 소, 중, 대" style="flex:1">
        <button onclick="addPackOptionTag()" style="padding:10px 14px;border-radius:10px;background:rgba(99,102,241,0.15);border:1px solid rgba(99,102,241,0.3);color:#a5b4fc;font-size:13px;font-weight:600">추가</button>
      </div>
    </div>
    <div class="field-wrap" id="pack-single-qty-wrap">
      <div class="field-label">수량</div>
      <input class="field-input" id="p-qty" type="number" min="0" placeholder="0">
    </div>
    <div class="field-wrap"><div class="field-label">단위</div><input class="field-input" id="p-unit" placeholder="개"></div>
    <button class="primary-btn" onclick="confirmPackModal()">저장</button>
    <button class="secondary-btn" onclick="closeModal('pack-modal')">취소</button>
  </div>
</div>

<!-- 포장용품 옵션 수량 -->
<div class="modal-overlay" id="packoptqty-modal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title" id="packoptqty-title">옵션별 수량</div>
    <div id="packoptqty-rows"></div>
    <button class="primary-btn" onclick="savePackOptQty()">저장</button>
    <button class="secondary-btn" onclick="closeModal('packoptqty-modal')">취소</button>
  </div>
</div>

<!-- 입출고 (포장) -->
<div class="modal-overlay" id="pack-io-modal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">포장용품 입출고</div>
    <div class="field-wrap">
      <div style="display:flex;gap:8px">
        <button id="pack-btn-in" class="type-btn" onclick="setPackIOType('입고')" style="background:rgba(52,211,153,0.15);color:#34d399;border:1.5px solid #34d399">📥 입고</button>
        <button id="pack-btn-out" class="type-btn" onclick="setPackIOType('출고')" style="background:rgba(255,255,255,0.05);color:#64748b;border:1.5px solid rgba(255,255,255,0.1)">📤 출고</button>
      </div>
    </div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, doc, setDoc, addDoc, deleteDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBHWNK9K1Ack5-Sj02PAuVbCu2gcOSnpMY",
  authDomain: "gm-stock-management.firebaseapp.com",
  projectId: "gm-stock-management",
  storageBucket: "gm-stock-management.firebasestorage.app",
  messagingSenderId: "590013505498",
  appId: "1:590013505498:web:59343cee0d152ee97c6ae3"
};
const fbApp = initializeApp(firebaseConfig);
const db = getFirestore(fbApp);

// ── State ──
let items=[], packaging=[], transactions=[];
let filterYear="전체", filterCollection="전체", filterTx="전체";
let expandedItems=new Set(), currentTab="chat";
let modalOptions=[], packModalOptions=[];
let ioItemId=null, ioOptName=null, ioType="출고";
let qtyItemId=null, qtyOptName=null;
let packIOId=null, packIOOptName=null, packIOType="출고";
let editingOptQtyId=null, editingPackOptQtyId=null;
let photoTargetId=null;
let isLoading=false;

// ── Helpers ──
function totalQty(item){
  if(!item.options||!item.options.length) return item.quantity||0;
  return item.options.reduce((a,o)=>a+(o.quantity||0),0);
}
function isLow(item){return totalQty(item)<10;}
function isPackLow(p){
  if(!p.options||!p.options.length) return (p.quantity||0)<10;
  return p.options.some(o=>(o.quantity||0)<10);
}
function nowTime(){return new Date().toLocaleTimeString("ko-KR",{hour:"2-digit",minute:"2-digit"});}
function todayDate(){return new Date().toISOString().slice(0,10);}
function showToast(msg,color="#34d399"){
  const t=document.getElementById("toast");
  t.textContent=msg;t.style.display="block";t.style.color=color;
  setTimeout(()=>t.style.display="none",2500);
}

// ── Firebase 저장 ──
async function saveItem(item){
  const data={...item};
  if(data.imageUrl&&data.imageUrl.startsWith("data:")) delete data.imageUrl;
  await setDoc(doc(collection(db,"items"),item.id),data);
}
async function savePack(p){await setDoc(doc(collection(db,"packaging"),p.id),{...p});}
async function saveTransaction(tx){
  await addDoc(collection(db,"transactions"),{...tx,createdAt:serverTimestamp()});
}

// ── Firebase 실시간 리스너 ──
let firstLoad=true;
onSnapshot(collection(db,"items"),snap=>{
  items=snap.docs.map(d=>({...d.data(),id:d.id}));
  renderStock();renderBanner();
  if(firstLoad){document.getElementById("loading-overlay").style.display="none";firstLoad=false;initChat();}
  document.getElementById("status-dot").style.background="#34d399";
  document.getElementById("status-text").textContent=`${items.length}종 · ${items.reduce((a,i)=>a+totalQty(i),0).toLocaleString()}개`;
},err=>{document.getElementById("loading-overlay").style.display="none";});

onSnapshot(collection(db,"packaging"),snap=>{
  packaging=snap.docs.map(d=>({...d.data(),id:d.id}));
  renderPack();renderBanner();
});
onSnapshot(query(collection(db,"transactions"),orderBy("createdAt","desc")),snap=>{
  transactions=snap.docs.map(d=>({...d.data(),id:d.id}));
  if(currentTab==="history")renderHistory();
});

// ── Tab ──
function switchTab(t){
  ["chat","stock","pack","history"].forEach(id=>{
    document.getElementById("tab-"+id).classList.remove("active");
    document.getElementById("nav-"+id).classList.remove("active");
  });
  document.getElementById("tab-"+t).classList.add("active");
  document.getElementById("nav-"+t).classList.add("active");
  currentTab=t;
  document.getElementById("fab-btn").className="add-fab"+(["stock","pack"].includes(t)?" show":"");
  if(t==="history")renderHistory();
}
window.switchTab=switchTab;

function openFabAction(){
  if(currentTab==="stock") openItemModal();
  else if(currentTab==="pack") openPackModal();
}
window.openFabAction=openFabAction;

// ── Modal ──
function openModal(id){document.getElementById(id).classList.add("open");}
function closeModal(id){document.getElementById(id).classList.remove("open");}
window.closeModal=closeModal;
document.querySelectorAll(".modal-overlay").forEach(m=>{m.addEventListener("click",e=>{if(e.target===m)m.classList.remove("open");});});

// ── 상품 모달 ──
function openItemModal(itemId){
  modalOptions=[];
  document.getElementById("modal-edit-id").value=itemId||"";
  document.getElementById("item-modal-title").textContent=itemId?"상품 수정":"상품 추가";
  const item=itemId?items.find(i=>i.id===itemId):null;
  document.getElementById("m-year").value=item?.year||"";
  document.getElementById("m-coll").value=item?.collection||"";
  document.getElementById("m-name").value=item?.name||"";
  document.getElementById("m-material").value=item?.material||"";
  document.getElementById("m-unit").value=item?.unit||"개";
  document.getElementById("m-qty").value=item?.quantity||0;
  if(item?.options?.length) modalOptions=item.options.map(o=>({name:o.name,quantity:o.quantity||0}));
  renderOptTags();openModal("item-modal");
}
window.openItemModal=openItemModal;

function addOptionTag(){
  const v=document.getElementById("opt-input").value.trim();
  if(!v)return;
  modalOptions.push({name:v,quantity:0});
  document.getElementById("opt-input").value="";
  renderOptTags();
}
window.addOptionTag=addOptionTag;
document.getElementById("opt-input").addEventListener("keydown",e=>{if(e.key==="Enter"){e.preventDefault();addOptionTag();}});

function removeOptTag(i){modalOptions.splice(i,1);renderOptTags();}
window.removeOptTag=removeOptTag;
function renderOptTags(){
  document.getElementById("opt-tags").innerHTML=modalOptions.map((o,i)=>`<span class="option-tag">${o.name}<button onclick="removeOptTag(${i})">×</button></span>`).join("");
  document.getElementById("single-qty-wrap").style.display=modalOptions.length>0?"none":"block";
}

async function confirmItemModal(){
  const name=document.getElementById("m-name").value.trim();
  if(!name){showToast("상품명을 입력해주세요","#f87171");return;}
  const editId=document.getElementById("modal-edit-id").value;
  const base={
    id:editId||"item_"+Date.now(),
    year:document.getElementById("m-year").value.trim()||null,
    collection:document.getElementById("m-coll").value.trim()||null,
    name,material:document.getElementById("m-material").value.trim()||null,
    unit:document.getElementById("m-unit").value.trim()||"개",
    options:modalOptions.length>0?modalOptions.map(o=>({name:o.name,quantity:o.quantity||0})):null,
    quantity:modalOptions.length>0?0:(parseInt(document.getElementById("m-qty").value)||0),
    imageUrl:editId?(items.find(i=>i.id===editId)?.imageUrl||null):null
  };
  await saveItem(base);
  closeModal("item-modal");
  showToast("저장됐어요 ✅");
  if(base.options?.length) openOptQtyModal(base.id);
}
window.confirmItemModal=confirmItemModal;

// ── 옵션 수량 모달 ──
function openOptQtyModal(itemId){
  editingOptQtyId=itemId;
  const item=items.find(i=>i.id===itemId);
  if(!item?.options)return;
  document.getElementById("optqty-title").textContent=item.name+" — 옵션별 수량";
  document.getElementById("optqty-rows").innerHTML=item.options.map((o,i)=>`
    <div class="field-wrap"><div class="field-label">${o.name}</div>
    <input class="field-input" id="optqty-${i}" type="number" min="0" value="${o.quantity||0}"></div>`).join("");
  openModal("optqty-modal");
}
window.openOptQtyModal=openOptQtyModal;

async function saveOptQty(){
  const item=items.find(i=>i.id===editingOptQtyId);
  if(!item?.options)return;
  item.options.forEach((o,i)=>{const v=parseInt(document.getElementById("optqty-"+i)?.value);if(!isNaN(v))o.quantity=v;});
  await saveItem(item);
  closeModal("optqty-modal");showToast("수량 저장됐어요 ✅");
}
window.saveOptQty=saveOptQty;

// ── 입출고 모달 ──
function openIOModal(itemId,optName,itemName){
  ioItemId=itemId;ioOptName=optName;ioType="출고";
  document.getElementById("io-modal-title").textContent=(optName?`${itemName} [${optName}]`:itemName)+" 입출고";
  document.getElementById("io-qty").value="";document.getElementById("io-dest").value="";
  setIOType("출고");openModal("io-modal");
}
window.openIOModal=openIOModal;

function setIOType(t){
  ioType=t;
  const inBtn=document.getElementById("btn-in"),outBtn=document.getElementById("btn-out");
  if(t==="입고"){
    inBtn.style.cssText="flex:1;padding:10px;font-size:14px;font-weight:700;border-radius:8px;background:rgba(52,211,153,0.2);color:#34d399;border:1.5px solid #34d399";
    outBtn.style.cssText="flex:1;padding:10px;font-size:14px;font-weight:700;border-radius:8px;background:rgba(255,255,255,0.05);color:#64748b;border:1.5px solid rgba(255,255,255,0.1)";
    document.getElementById("io-dest-label").textContent="입고처";
    document.getElementById("io-dest").placeholder="예: 제조사, 공급업체";
  }else{
    outBtn.style.cssText="flex:1;padding:10px;font-size:14px;font-weight:700;border-radius:8px;background:rgba(248,113,113,0.2);color:#f87171;border:1.5px solid #f87171";
    inBtn.style.cssText="flex:1;padding:10px;font-size:14px;font-weight:700;border-radius:8px;background:rgba(255,255,255,0.05);color:#64748b;border:1.5px solid rgba(255,255,255,0.1)";
    document.getElementById("io-dest-label").textContent="출고처";
    document.getElementById("io-dest").placeholder="예: 신세계 강남점";
  }
}
window.setIOType=setIOType;

async function confirmIO(){
  const qty=parseInt(document.getElementById("io-qty").value);
  const dest=document.getElementById("io-dest").value.trim()||"-";
  if(!qty||qty<=0){showToast("수량을 입력해주세요","#f87171");return;}
  const item=items.find(i=>i.id===ioItemId);if(!item)return;
  let curQty,opt;
  if(ioOptName&&item.options){opt=item.options.find(o=>o.name===ioOptName);curQty=opt?.quantity||0;}
  else curQty=item.quantity||0;
  if(ioType==="출고"&&curQty<qty){showToast(`재고 부족! 현재 ${curQty}${item.unit}`,"#f87171");return;}
  const newQty=ioType==="입고"?curQty+qty:curQty-qty;
  if(opt)opt.quantity=newQty;else item.quantity=newQty;
  await saveItem(item);
  await saveTransaction({itemId:item.id,itemName:item.name,optionName:ioOptName||null,collection:item.collection,unit:item.unit,type:ioType,quantity:qty,destination:dest,date:todayDate(),time:nowTime()});
  closeModal("io-modal");
  showToast(`${ioType} 완료! 잔여 ${newQty}${item.unit}`);
  if(newQty<10)showToast(`🔴 ${item.name} 발주 필요! (${newQty}${item.unit})`,"#ef4444");
}
window.confirmIO=confirmIO;

// ── 수량 직접 수정 ──
function openQtyModal(itemId,optName,itemName,current){
  qtyItemId=itemId;qtyOptName=optName;
  document.getElementById("qty-modal-title").textContent=optName?`${itemName} [${optName}]`:itemName;
  document.getElementById("qty-current").textContent=current;
  document.getElementById("qty-new").value=current;
  openModal("qty-modal");
}
window.openQtyModal=openQtyModal;

async function confirmQty(){
  const val=parseInt(document.getElementById("qty-new").value);
  if(isNaN(val)||val<0){showToast("올바른 수량을 입력해주세요","#f87171");return;}
  const item=items.find(i=>i.id===qtyItemId);if(!item)return;
  if(qtyOptName&&item.options){const o=item.options.find(x=>x.name===qtyOptName);if(o)o.quantity=val;}
  else item.quantity=val;
  await saveItem(item);closeModal("qty-modal");showToast("수량 수정됐어요 ✅");
}
window.confirmQty=confirmQty;

// ── 포장용품 ──
function openPackModal(packId){
  packModalOptions=[];
  document.getElementById("pack-edit-id").value=packId||"";
  const p=packId?packaging.find(x=>x.id===packId):null;
  document.getElementById("p-name").value=p?.name||"";
  document.getElementById("p-desc").value=p?.desc||"";
  document.getElementById("p-unit").value=p?.unit||"개";
  document.getElementById("p-qty").value=p?.quantity||0;
  if(p?.options?.length) packModalOptions=p.options.map(o=>({name:o.name,quantity:o.quantity||0}));
  renderPackOptTags();openModal("pack-modal");
}
window.openPackModal=openPackModal;

function addPackOptionTag(){
  const v=document.getElementById("pack-opt-input").value.trim();if(!v)return;
  packModalOptions.push({name:v,quantity:0});document.getElementById("pack-opt-input").value="";
  renderPackOptTags();
}
window.addPackOptionTag=addPackOptionTag;
document.getElementById("pack-opt-input").addEventListener("keydown",e=>{if(e.key==="Enter"){e.preventDefault();addPackOptionTag();}});
function removePackOptTag(i){packModalOptions.splice(i,1);renderPackOptTags();}
window.removePackOptTag=removePackOptTag;
function renderPackOptTags(){
  document.getElementById("pack-opt-tags").innerHTML=packModalOptions.map((o,i)=>`<span class="option-tag">${o.name}<button onclick="removePackOptTag(${i})">×</button></span>`).join("");
  document.getElementById("pack-single-qty-wrap").style.display=packModalOptions.length>0?"none":"block";
}

async function confirmPackModal(){
  const name=document.getElementById("p-name").value.trim();
  if(!name){showToast("품목명을 입력해주세요","#f87171");return;}
  const editId=document.getElementById("pack-edit-id").value;
  const base={
    id:editId||"pack_"+Date.now(),
    name,desc:document.getElementById("p-desc").value.trim()||null,
    unit:document.getElementById("p-unit").value.trim()||"개",
    options:packModalOptions.length>0?packModalOptions.map(o=>({name:o.name,quantity:o.quantity||0})):null,
    quantity:packModalOptions.length>0?0:(parseInt(document.getElementById("p-qty").value)||0)
  };
  await savePack(base);closeModal("pack-modal");showToast("저장됐어요 ✅");
  if(base.options?.length) openPackOptQtyModal(base.id);
}
window.confirmPackModal=confirmPackModal;

function openPackOptQtyModal(packId){
  editingPackOptQtyId=packId;
  const p=packaging.find(x=>x.id===packId);if(!p?.options)return;
  document.getElementById("packoptqty-title").textContent=p.name+" — 옵션별 수량";
  document.getElementById("packoptqty-rows").innerHTML=p.options.map((o,i)=>`
    <div class="field-wrap"><div class="field-label">${o.name}</div>
    <input class="field-input" id="packoptqty-${i}" type="number" min="0" value="${o.quantity||0}"></div>`).join("");
  openModal("packoptqty-modal");
}
window.openPackOptQtyModal=openPackOptQtyModal;

async function savePackOptQty(){
  const p=packaging.find(x=>x.id===editingPackOptQtyId);if(!p?.options)return;
  p.options.forEach((o,i)=>{const v=parseInt(document.getElementById("packoptqty-"+i)?.value);if(!isNaN(v))o.quantity=v;});
  await savePack(p);closeModal("packoptqty-modal");showToast("수량 저장됐어요 ✅");
}
window.savePackOptQty=savePackOptQty;

// 포장용품 입출고
function openPackIOModal(packId,optName){
  packIOId=packId;packIOOptName=optName;packIOType="출고";
  document.getElementById("pack-io-qty").value="";document.getElementById("pack-io-dest").value="";

window.openPackIOModal=openPackIOModal;

function setPackIOType(t){

  const inBtn=document.getElementById("pack-btn-in"),outBtn=document.getElementById("pack-btn-out");

    inBtn.style.cssText="flex:1;padding:10px;font-size:14px;font-weight:700;border-radius:8px;background:rgba(52,211,153,0.2);color:#34d399;border:1.5px solid #34d399";
    outBtn.style.cssText="flex:1;padding:10px;font-size:14px;font-weight:700;border-radius:8px;background:rgba(255,255,255,0.05);color:#64748b;border:1.5px solid rgba(255,255,255,0.1)";

  }else{
    outBtn.style.cssText="flex:1;padding:10px;font-size:14px;font-weight:700;border-radius:8px;background:rgba(248,113,113,0.2);color:#f87171;border:1.5px solid #f87171";
    inBtn.style.cssText="flex:1;padding:10px;font-size:14px;font-weight:700;border-radius:8px;background:rgba(255,255,255,0.05);color:#64748b;border:1.5px solid rgba(255,255,255,0.1)";
    document.getElementById("pack-io-dest-label").textContent="출고처";
    document.getElementById("pack-io-dest").placeholder="예: 신세계 강남점";
  }
}
window.setPackIOType=setPackIOType;

async function confirmPackIO(){
  const qty=parseInt(document.getElementById("pack-io-qty").value);
  const dest=document.getElementById("pack-io-dest").value.trim()||"-";
  if(!qty||qty<=0){showToast("수량을 입력해주세요","#f87171");return;}
  const p=packaging.find(x=>x.id===packIOId);if(!p)return;
  let curQty,opt;
  if(packIOOptName&&p.options){opt=p.options.find(o=>o.name===packIOOptName);curQty=opt?.quantity||0;}
  else curQty=p.quantity||0;
  if(packIOType==="출고"&&curQty<qty){showToast(`재고 부족! 현재 ${curQty}${p.unit}`,"#f87171");return;}
  const newQty=packIOType==="입고"?curQty+qty:curQty-qty;
  if(opt)opt.quantity=newQty;else p.quantity=newQty;
  await savePack(p);
  await saveTransaction({itemId:p.id,itemName:p.name,optionName:packIOOptName||null,collection:"포장용품",unit:p.unit,type:packIOType,quantity:qty,destination:dest,date:todayDate(),time:nowTime()});
  closeModal("pack-io-modal");showToast(`${packIOType} 완료! 잔여 ${newQty}${p.unit}`);
}

function renderStock(){

  const cols=[...new Set(filteredByYear.map(i=>i.collection).filter(Boolean))];
  document.getElementById("stock-stat-row").innerHTML=[
    {lbl:"전체 상품",val:items.length+"종",c:"#60a5fa"},
    {lbl:"총 수량",val:total.toLocaleString(),c:"#a78bfa"},
    {lbl:"컬렉션 수",val:cols.length+"개",c:"#34d399"},
    {lbl:"재고 부족",val:low.length+"종",c:low.length>0?"#ef4444":"#64748b"},
  ].map(s=>`<div class="stat-tile"><div class="stat-val" style="color:${s.c}">${s.val}</div><div class="stat-lbl">${s.lbl}</div></div>`).join("");

  const filtered=items.filter(i=>(filterYear==="전체"||String(i.year||"")==filterYear)&&(filterCollection==="전체"||i.collection===filterCollection));

      </div>

              ${low?`<div class="low-overlay"><span>발주필요</span></div>`:""}
              <div class="item-card-img-overlay"><span style="font-size:18px">📷</span><span style="font-size:10px;color:#fff;margin-top:2px">${item.imageUrl?"변경":"추가"}</span></div>
            </div>
            <div class="item-card-body">

              ${item.material?`<div class="item-card-meta">${item.material}</div>`:""}

}

// ── AI 채팅 (Claude.ai 내부에서만 사용) ──
function initChat(){
  if(document.getElementById("chat-messages").children.length>0)return;
  const wrap=document.createElement("div");wrap.className="bubble-wrap ai";
  const b=document.createElement("div");b.className="bubble-ai";
  b.textContent="안녕하세요! 재고 관리 AI입니다 👋\n\n채팅으로 입출고를 말씀해 주세요:\n• \"아크릴 가이드 500mm 1홀 3개 신세계 강남 출고\"\n• \"발주 필요 상품 알려줘\"\n• \"전체 재고 현황\"\n\n재고·포장용품 탭에서 직접 수정도 가능해요!";
  wrap.appendChild(b);document.getElementById("chat-messages").appendChild(wrap);
}

// AI 채팅은 Claude.ai 환경에서만 동작 (window.claude_chat_available 체크)
document.getElementById("msg-input").addEventListener("input",function(){
  this.style.height="auto";this.style.height=Math.min(this.scrollHeight,120)+"px";
  document.getElementById("send-btn").disabled=!this.value.trim();
});
document.getElementById("msg-input").addEventListener("keydown",e=>{
  if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendMessage();}
});

async function sendMessage(){
  const inp=document.getElementById("msg-input");
  const text=inp.value.trim();if(!text||isLoading)return;
  inp.value="";inp.style.height="";document.getElementById("send-btn").disabled=true;
  addBubble("user",text);isLoading=true;addTyping();
  try{
    const summary=items.length===0?"현재 등록된 상품 없음"
      :items.map(i=>{const opts=i.options?i.options.map(o=>`${o.name}:${o.quantity||0}${i.unit}`).join(","):`수량:${i.quantity||0}${i.unit}`;return`- id:${i.id} | ${[i.year,i.collection,i.name,i.material].filter(Boolean).join("/")} | ${opts}`;}).join("\n");
    const res=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        model:"claude-sonnet-4-20250514",max_tokens:1500,
        system:`재고 관리 AI. JSON으로만 응답. 마크다운 없음.
현재 재고:\n${summary}
응답: {"action":"출고|입고|재고조회|일괄재고수정|재고수정|대화","message":"한국어","data":{}}
data: 출고/입고={itemId,optionName,quantity,destination,unit}, 일괄재고수정={items:[{itemId,optionName,newQuantity}]}, 재고수정={itemId,optionName,newQuantity}
규칙: 출고수량>재고면 data=null, "전체/모든"→일괄재고수정 모든id포함`,
        messages:[{role:"user",content:text}]
      })
    });
    const data=await res.json();
    const raw=data.content?.[0]?.text||"";
    let parsed;
    try{parsed=JSON.parse(raw.replace(/```json|```/g,"").trim());}
    catch{removeTyping();addBubble("ai","다시 말씀해 주세요.");isLoading=false;return;}
    const{action,message,data:d}=parsed;
    let extra="";
    if((action==="출고"||action==="입고")&&d){
      const item=items.find(i=>i.id===d.itemId);
      if(item){
        let curQty,opt;
        if(d.optionName&&item.options){opt=item.options.find(o=>o.name===d.optionName||o.name.includes(d.optionName));curQty=opt?.quantity||0;}
        else curQty=item.quantity||0;
        if(action==="출고"&&curQty<d.quantity){removeTyping();addBubble("ai",`재고 부족! 현재 ${curQty}${item.unit}`);isLoading=false;return;}
        const newQty=action==="입고"?curQty+d.quantity:curQty-d.quantity;
        if(opt)opt.quantity=newQty;else item.quantity=newQty;
        await saveItem(item);
        await saveTransaction({itemId:item.id,itemName:item.name,optionName:d.optionName||null,collection:item.collection,unit:item.unit,type:action,quantity:d.quantity,destination:d.destination||"-",date:todayDate(),time:nowTime()});
        if(newQty<10)extra=`\n\n🔴 ${item.name}${d.optionName?` [${d.optionName}]`:""} 발주 필요! (${newQty}${item.unit})`;
      }
    }else if(action==="일괄재고수정"&&d?.items?.length){
      let count=0;
      for(const{itemId,optionName,newQuantity} of d.items){
        const item=items.find(i=>i.id===itemId);
        if(item&&typeof newQuantity==="number"){
          if(optionName&&item.options){const o=item.options.find(x=>x.name===optionName);if(o){o.quantity=newQuantity;count++;}}
          else{item.quantity=newQuantity;count++;}
          await saveItem(item);
        }
      }
      extra=`\n✅ ${count}개 항목 업데이트 완료`;
    }else if(action==="재고수정"&&d){
      const item=items.find(i=>i.id===d.itemId);
      if(item){
        if(d.optionName&&item.options){const o=item.options.find(x=>x.name===d.optionName);if(o)o.quantity=d.newQuantity;}
        else item.quantity=d.newQuantity;
        await saveItem(item);
      }
    }
    removeTyping();addBubble("ai",message+extra);
  }catch(e){removeTyping();addBubble("ai","오류가 발생했어요. 다시 시도해 주세요.");}
  isLoading=false;
}
window.sendMessage=sendMessage;

function fillInput(text){const inp=document.getElementById("msg-input");inp.value=text;inp.focus();document.getElementById("send-btn").disabled=false;}
window.fillInput=fillInput;

function addBubble(role,text){
  const wrap=document.createElement("div");wrap.className="bubble-wrap fade-up "+role;
  const b=document.createElement("div");b.className=role==="user"?"bubble-user":"bubble-ai";
  b.textContent=text;
  const t=document.createElement("div");t.className="bubble-time";t.textContent=nowTime();
  wrap.appendChild(b);wrap.appendChild(t);
  document.getElementById("chat-messages").appendChild(wrap);
  document.getElementById("chat-scroll").scrollTop=999999;
}
function addTyping(){
  const wrap=document.createElement("div");wrap.className="bubble-wrap ai fade-up";wrap.id="typing-ind";
  const b=document.createElement("div");b.className="bubble-ai dots";
  b.innerHTML='<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
  wrap.appendChild(b);document.getElementById("chat-messages").appendChild(wrap);
  document.getElementById("chat-scroll").scrollTop=999999;
}
function removeTyping(){document.getElementById("typing-ind")?.remove();}
