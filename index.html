<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="재고관리">
<title>재고관리 (관리자)</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'Pretendard Variable','Pretendard',sans-serif;display:flex;flex-direction:column;height:100dvh;transition:background .3s,color .3s}
body.dark{background:#0a0a0f;color:#e2e8f0}
body.light{background:#f5f5f7;color:#111827}
input,textarea,select{outline:none;font-family:inherit}
button{font-family:inherit;cursor:pointer;border:none}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}
body.dark ::-webkit-scrollbar-thumb{background:#2a2a3e;border-radius:99px}
body.light ::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:99px}
#app-header{padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;flex-shrink:0;backdrop-filter:blur(12px)}
body.dark #app-header{background:rgba(10,10,15,0.97);border-bottom:1px solid rgba(255,255,255,0.07)}
body.light #app-header{background:rgba(245,245,247,0.97);border-bottom:1px solid rgba(0,0,0,0.08)}
.logo-box{width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,#3b82f6,#6366f1);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.theme-toggle{position:relative;width:52px;height:28px;border-radius:99px;cursor:pointer;border:none;flex-shrink:0;transition:background .3s}
body.dark .theme-toggle{background:#334155}
body.light .theme-toggle{background:#fbbf24}
.theme-knob{position:absolute;top:3px;width:22px;height:22px;border-radius:50%;background:#fff;transition:left .3s;display:flex;align-items:center;justify-content:center;font-size:13px;box-shadow:0 1px 4px rgba(0,0,0,0.25)}
body.dark .theme-knob{left:3px}
body.light .theme-knob{left:27px}
#bottom-nav{display:flex;flex-shrink:0}
body.dark #bottom-nav{background:rgba(10,10,15,0.97);border-top:1px solid rgba(255,255,255,0.07)}
body.light #bottom-nav{background:rgba(245,245,247,0.97);border-top:1px solid rgba(0,0,0,0.08)}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:9px 4px 11px;gap:3px;font-size:10px;font-weight:600;background:transparent;position:relative;transition:color .15s}
body.dark .nav-btn{color:#475569}
body.light .nav-btn{color:#9ca3af}
.nav-btn.active{color:#6366f1}
.nav-icon{font-size:19px}
.nav-badge{position:absolute;top:6px;right:50%;transform:translateX(10px);min-width:16px;height:16px;border-radius:99px;background:#ef4444;font-size:9px;font-weight:800;color:#fff;display:flex;align-items:center;justify-content:center;padding:0 3px}
#app-body{flex:1;overflow:hidden;display:flex;flex-direction:column}
.tab-pane{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;display:none}
.tab-pane.active{display:block}
.page-scroll{padding:12px 14px}
.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.stat-tile{border-radius:12px;padding:13px}
body.dark .stat-tile{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07)}
body.light .stat-tile{background:#fff;border:1px solid rgba(0,0,0,0.08)}
.stat-val{font-size:18px;font-weight:800}
.stat-lbl{font-size:10px;margin-top:2px}
body.dark .stat-lbl{color:#475569}
body.light .stat-lbl{color:#6b7280}
.filter-label{font-size:10px;font-weight:600;margin-bottom:5px}
body.dark .filter-label{color:#475569}
body.light .filter-label{color:#6b7280}
.filter-row{display:flex;gap:5px;overflow-x:auto;padding-bottom:4px;margin-bottom:10px;flex-wrap:wrap}
.filter-row::-webkit-scrollbar{display:none}
.fbtn{padding:5px 12px;border-radius:99px;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .15s}
body.dark .fbtn{border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.04);color:#64748b}
body.light .fbtn{border:1px solid rgba(0,0,0,0.1);background:rgba(0,0,0,0.04);color:#6b7280}
.fbtn.on{background:linear-gradient(135deg,#3b82f6,#6366f1)!important;border-color:transparent!important;color:#fff!important}
.collection-group{margin-bottom:16px}
.coll-header{display:flex;align-items:center;gap:8px;padding:10px 14px;font-weight:700;font-size:12px;cursor:pointer;user-select:none}
body.dark .coll-header{background:rgba(99,102,241,0.08);border:1px solid rgba(99,102,241,0.2);border-radius:10px 10px 0 0}
body.light .coll-header{background:rgba(99,102,241,0.06);border:1px solid rgba(99,102,241,0.25);border-radius:10px 10px 0 0}
.coll-header.collapsed{border-radius:10px!important}
.items-wrap{padding:8px;border-top:none;border-radius:0 0 10px 10px}
body.dark .items-wrap{background:rgba(255,255,255,0.01);border:1px solid rgba(255,255,255,0.07)}
body.light .items-wrap{background:rgba(0,0,0,0.02);border:1px solid rgba(0,0,0,0.08)}
.item-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;align-items:start}
@media(max-width:900px){.item-grid{grid-template-columns:repeat(4,1fr)}}
@media(max-width:600px){.item-grid{grid-template-columns:repeat(2,1fr)}}
.item-card{border-radius:10px;overflow:hidden;display:flex;flex-direction:column}
body.dark .item-card{background:#0f1020;border:1px solid rgba(255,255,255,0.07)}
body.light .item-card{background:#fff;border:1px solid rgba(0,0,0,0.08)}
.item-card.low-stock{border-color:rgba(239,68,68,0.35)!important}
.item-img{width:100%;aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:28px;position:relative;overflow:hidden}
body.dark .item-img{background:rgba(255,255,255,0.03)}
body.light .item-img{background:rgba(0,0,0,0.04)}
.item-img img{width:100%;height:100%;object-fit:contain}
.low-mask{position:absolute;inset:0;background:rgba(239,68,68,0.35);pointer-events:none}
.item-body{padding:9px 10px;flex:1;display:flex;flex-direction:column;gap:3px}
.item-name{font-weight:700;font-size:12px;line-height:1.3}
body.dark .item-name{color:#e2e8f0}
body.light .item-name{color:#111827}
.item-sub{font-size:9px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
body.dark .item-sub{color:#475569}
body.light .item-sub{color:#6b7280}
.item-qty{font-size:17px;font-weight:800;margin-top:2px}
.unit{font-size:10px;font-weight:400}
body.dark .unit{color:#475569}
body.light .unit{color:#6b7280}
.opts-panel{border-top:1px solid rgba(128,128,128,0.1);padding:6px 10px;max-height:160px;overflow-y:auto}
body.dark .opts-panel{background:rgba(0,0,0,0.3)}
body.light .opts-panel{background:rgba(0,0,0,0.03)}
.opt-row{display:flex;align-items:center;gap:6px;padding:5px 0}
.opt-row+.opt-row{border-top:1px solid rgba(128,128,128,0.07)}
.opt-name{flex:1;font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
body.dark .opt-name{color:#94a3b8}
body.light .opt-name{color:#6b7280}
.opt-qty{font-weight:800;font-size:13px;flex-shrink:0}
.btn-cart{width:100%;padding:6px 0;border-radius:7px;font-size:11px;font-weight:700;background:rgba(99,102,241,0.15);border:1px solid rgba(99,102,241,0.3);color:#a5b4fc;margin-top:6px}
.card-actions{padding:6px 8px;border-top:1px solid rgba(128,128,128,0.1)}
.cart-item{border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:12px;margin-bottom:8px}
body.dark .cart-item{background:#0f1020;border:1px solid rgba(255,255,255,0.07)}
body.light .cart-item{background:#fff;border:1px solid rgba(0,0,0,0.08)}
.week-group{margin-bottom:20px}
.week-header{display:flex;align-items:center;gap:8px;padding:10px 14px;font-weight:700;font-size:12px}
body.dark .week-header{background:rgba(59,130,246,0.08);border:1px solid rgba(59,130,246,0.2);border-radius:10px 10px 0 0}
body.light .week-header{background:rgba(59,130,246,0.06);border:1px solid rgba(59,130,246,0.2);border-radius:10px 10px 0 0}
.week-cycle{display:flex;gap:8px;flex-wrap:wrap;padding:7px 14px}
body.dark .week-cycle{background:rgba(255,255,255,0.02);border-left:1px solid rgba(59,130,246,0.2);border-right:1px solid rgba(59,130,246,0.2)}
body.light .week-cycle{background:rgba(0,0,0,0.02);border-left:1px solid rgba(59,130,246,0.2);border-right:1px solid rgba(59,130,246,0.2)}
.order-list{overflow:hidden;border-radius:0 0 10px 10px}
body.dark .order-list{border:1px solid rgba(59,130,246,0.2);border-top:none}
body.light .order-list{border:1px solid rgba(59,130,246,0.2);border-top:none}
.order-row{padding:12px 14px}
.order-row+.order-row{border-top:1px solid rgba(128,128,128,0.08)}
body.dark .order-row:nth-child(even){background:rgba(255,255,255,0.02)}
body.light .order-row:nth-child(even){background:rgba(0,0,0,0.02)}
.status-badge{padding:3px 10px;border-radius:99px;font-size:11px;font-weight:600}
.status-ready{background:rgba(251,191,36,0.15);color:#fbbf24;border:1px solid rgba(251,191,36,0.3)}
.status-done{background:rgba(52,211,153,0.15);color:#34d399;border:1px solid rgba(52,211,153,0.3)}
.item-chip{display:inline-flex;align-items:center;gap:3px;font-size:11px;padding:3px 8px;border-radius:6px;margin:2px}
body.dark .item-chip{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);color:#94a3b8}
body.light .item-chip{background:rgba(0,0,0,0.04);border:1px solid rgba(0,0,0,0.08);color:#6b7280}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.75);display:flex;align-items:flex-end;justify-content:center;z-index:100}
.modal-sheet{border-radius:20px 20px 0 0;width:100%;max-width:440px;padding:20px 18px;padding-bottom:max(20px,env(safe-area-inset-bottom));max-height:85dvh;overflow-y:auto}
body.dark .modal-sheet{background:#13141f}
body.light .modal-sheet{background:#fff}
.modal-handle{width:36px;height:4px;border-radius:2px;margin:0 auto 16px}
body.dark .modal-handle{background:rgba(255,255,255,0.15)}
body.light .modal-handle{background:rgba(0,0,0,0.1)}
.modal-title{font-weight:800;font-size:16px;margin-bottom:14px}
.field-label{font-size:12px;font-weight:600;margin-bottom:5px}
body.dark .field-label{color:#94a3b8}
body.light .field-label{color:#6b7280}
.field-wrap{margin-bottom:12px}
.field-input{width:100%;border-radius:10px;padding:10px 13px;font-size:14px}
body.dark .field-input{background:rgba(255,255,255,0.05);border:1.5px solid rgba(255,255,255,0.1);color:#e2e8f0}
body.light .field-input{background:rgba(0,0,0,0.04);border:1.5px solid rgba(0,0,0,0.1);color:#111827}
.field-input:focus{border-color:#6366f1}
.btn-primary{width:100%;padding:13px;border-radius:12px;background:linear-gradient(135deg,#3b82f6,#6366f1);color:#fff;font-weight:700;font-size:15px;margin-top:6px}
.btn-secondary-sm{padding:11px;border-radius:12px;font-weight:600;font-size:14px;margin-top:8px;width:100%}
body.dark .btn-secondary-sm{background:rgba(255,255,255,0.06);color:#94a3b8;border:none}
body.light .btn-secondary-sm{background:rgba(0,0,0,0.05);color:#6b7280;border:none}
.opt-sel-btn{padding:6px 12px;border-radius:99px;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;margin:3px}
body.dark .opt-sel-btn{border:1.5px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.04);color:#64748b}
body.light .opt-sel-btn{border:1.5px solid rgba(0,0,0,0.1);background:rgba(0,0,0,0.04);color:#6b7280}
.opt-sel-btn.sel{border-color:#6366f1;background:rgba(99,102,241,0.2);color:#a5b4fc}
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);border-radius:12px;padding:10px 20px;font-size:13px;font-weight:600;z-index:200;display:none;white-space:nowrap}
body.dark #toast{background:rgba(20,20,40,0.97);border:1px solid rgba(255,255,255,0.12);color:#e2e8f0}
body.light #toast{background:#1f2937;color:#f9fafb}
#loading{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:999}
body.dark #loading{background:#0a0a0f}
body.light #loading{background:#f5f5f7}
.spinner{width:36px;height:36px;border:3px solid rgba(99,102,241,0.2);border-top-color:#6366f1;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body class="dark">
<div id="loading"><div class="spinner"></div><div style="font-size:14px;color:#475569">연결 중...</div></div>
<div id="toast"></div>

<!-- 장바구니 담기 모달 -->
<div class="modal-bg" id="cart-modal" style="display:none" onclick="if(event.target===this)closeModal('cart-modal')">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title" id="cart-modal-title">장바구니 담기</div>
    <div id="cart-opt-wrap" style="margin-bottom:14px"></div>
    <div class="field-wrap">
      <div class="field-label">수량</div>
      <div style="display:flex;align-items:center;gap:12px;margin-top:4px">
        <button onclick="adjQty(-1)" style="width:36px;height:36px;border-radius:99px;font-size:20px;font-weight:300;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);color:#e2e8f0;display:flex;align-items:center;justify-content:center">−</button>
        <input type="number" id="cart-qty" min="1" value="1" class="field-input" style="width:72px;text-align:center;padding:8px;font-size:18px;font-weight:800">
        <button onclick="adjQty(1)" style="width:36px;height:36px;border-radius:99px;font-size:20px;font-weight:300;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);color:#e2e8f0;display:flex;align-items:center;justify-content:center">＋</button>
        <span id="cart-stock-label" style="font-size:11px;color:#475569"></span>
      </div>
    </div>
    <button class="btn-primary" onclick="confirmAddToCart()">🛒 장바구니에 담기</button>

  </div>
</div>

<!-- 발주 확인 모달 -->
<div class="modal-bg" id="checkout-modal" style="display:none" onclick="if(event.target===this)closeModal('checkout-modal')">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">📦 발주 요청서 확인</div>
    <div id="checkout-list" style="border-radius:12px;padding:12px 14px;margin-bottom:14px" class="stat-tile"></div>
    <div class="field-wrap">
      <div class="field-label">매장명 *</div>
      <input class="field-input" id="store-name" placeholder="예: 신세계 강남점" onkeydown="if(event.key==='Enter')confirmOrder()">
    </div>
    <button class="btn-primary" onclick="confirmOrder()">🚀 발주하기</button>
    <button class="btn-secondary-sm" onclick="closeModal('checkout-modal')">취소</button>
  </div>
</div>

<!-- 헤더 -->
<div id="app-header">
  <div style="display:flex;align-items:center;gap:10px">
    <div class="logo-box">📦</div>
    <div>
      <div style="font-weight:800;font-size:14px">재고관리 <span style="font-size:10px;color:#6366f1;font-weight:600">관리자</span></div>
      <div class="stat-lbl" id="header-sub">연결 중...</div>
    </div>
  </div>
  <button class="theme-toggle" onclick="toggleTheme()"><div class="theme-knob" id="theme-knob">🌙</div></button>
</div>

<div id="app-body">
  <div id="tab-stock" class="tab-pane active"><div class="page-scroll">
    <div class="stat-row" id="stock-stats"></div>
    <div class="filter-label">연도</div><div class="filter-row" id="yr-filters"></div>
    <div class="filter-label">컬렉션</div><div class="filter-row" id="cl-filters"></div>
    <div id="stock-groups"></div>
    <div style="height:80px"></div>
  </div></div>

  <div id="tab-cart" class="tab-pane"><div class="page-scroll" id="cart-page">
    <div style="height:80px"></div>
  </div></div>

  <div id="tab-orders" class="tab-pane"><div class="page-scroll">
    <div id="orders-list"></div>
    <div style="height:80px"></div>
  </div></div>
  <div id="tab-history" class="tab-pane"><div class="page-scroll">
    <div class="filter-row" id="tx-filters"></div>
    <div id="tx-list" style="border-radius:14px;overflow:hidden"></div>
  </div></div>
</div>

<div id="bottom-nav">
  <button class="nav-btn active" id="nav-stock" onclick="switchTab('stock')"><span class="nav-icon">📦</span>재고</button>
  <button class="nav-btn" id="nav-cart" onclick="switchTab('cart')"><span class="nav-icon">🛒</span>장바구니<div class="nav-badge" id="cart-badge" style="display:none">0</div></button>
  <button class="nav-btn" id="nav-orders" onclick="switchTab('orders')"><span class="nav-icon">📋</span>출고요청</button>
  <button class="nav-btn" id="nav-history" onclick="switchTab('history')"><span class="nav-icon">📒</span>내역</button>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getFirestore,collection,doc,setDoc,addDoc,onSnapshot,query,orderBy,serverTimestamp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const db=getFirestore(initializeApp({
  apiKey:"AIzaSyBHWNK9K1Ack5-Sj02PAuVbCu2gcOSnpMY",
  authDomain:"gm-stock-management.firebaseapp.com",
  projectId:"gm-stock-management",
  storageBucket:"gm-stock-management.firebasestorage.app",
  messagingSenderId:"590013505498",
  appId:"1:590013505498:web:59343cee0d152ee97c6ae3"
}));

let items=[],orders=[],cart=[];
let filterYear="전체",filterColl="전체";
let collapsedGroups=new Set();
let showLowOnly=false,isDark=true;
let cartTarget=null,cartSelOpt=null;

function isSet(i){return i.name&&i.name.toUpperCase().includes("SET");}
function totalQty(i){
  if(!i.options?.length)return i.quantity||0;
  if(isSet(i))return Math.min(...i.options.map(o=>o.quantity||0));
  return i.options.reduce((a,o)=>a+(o.quantity||0),0);
}
function isLow(i){return totalQty(i)<10;}
function getWeekLabel(dateStr){
  const d=new Date(dateStr),day=d.getDay();
  const diff=(day-3+7)%7;
  const wed=new Date(d);wed.setDate(d.getDate()-diff);
  const tue=new Date(wed);tue.setDate(wed.getDate()+6);
  const fmt=dt=>`${dt.getMonth()+1}/${dt.getDate()}`;
  const days=["일","월","화","수","목","금","토"];
  return `${fmt(wed)}(${days[wed.getDay()]})~${fmt(tue)}(${days[tue.getDay()]})`;
}
function nowTime(){return new Date().toLocaleTimeString("ko-KR",{hour:"2-digit",minute:"2-digit"});}
function todayDate(){return new Date().toISOString().slice(0,10);}

function showToast(msg,color="#34d399"){
  const t=document.getElementById("toast");
  t.textContent=msg;t.style.color=color;t.style.display="block";
  clearTimeout(t._tid);t._tid=setTimeout(()=>t.style.display="none",2500);
}

window.toggleTheme=()=>{
  isDark=!isDark;
  document.body.className=isDark?"dark":"light";
  document.getElementById("theme-knob").textContent=isDark?"🌙":"☀️";
  renderStock();renderOrders();
};

window.switchTab=t=>{
  ["stock","cart","orders","history"].forEach(id=>{
    document.getElementById("tab-"+id).classList.remove("active");
    document.getElementById("nav-"+id).classList.remove("active");
  });
  document.getElementById("tab-"+t).classList.add("active");
  document.getElementById("nav-"+t).classList.add("active");
  if(t==="cart")renderCart();
  if(t==="orders")renderOrders();
  if(t==="history")renderHistory();
};

window.closeModal=id=>document.getElementById(id).style.display="none";
document.querySelectorAll(".modal-bg").forEach(m=>m.addEventListener("click",e=>{if(e.target===m)m.style.display="none";}));

// ── Firebase ──
let firstLoad=true;
onSnapshot(collection(db,"items"),snap=>{
  items=snap.docs.map(d=>({...d.data(),id:d.id}));
  if(firstLoad){document.getElementById("loading").style.display="none";firstLoad=false;}
  const total=items.reduce((a,i)=>a+totalQty(i),0);

window.openCartModal=(itemId)=>{

function renderCartOptWrap(){
  const wrap=document.getElementById("cart-opt-wrap");
  if(!cartTarget?.options?.length){wrap.innerHTML="";return;}
  wrap.innerHTML=`<div class="field-label" style="margin-bottom:8px">옵션 선택</div><div style="display:flex;flex-wrap:wrap;gap:4px">`
    +cartTarget.options.map(o=>`<button class="opt-sel-btn${cartSelOpt===o.name?" sel":""}" onclick="selOpt('${o.name.replace(/'/g,"\\'")}')">
      ${o.name}<span style="font-size:10px;opacity:.7;margin-left:4px">${o.quantity||0}개</span>
    </button>`).join("")+`</div>`;

window.selOpt=name=>{cartSelOpt=name;renderCartOptWrap();updateStockLabel();};
function updateStockLabel(){
  if(!cartTarget)return;
  let stock=0;
  if(cartSelOpt&&cartTarget.options){const o=cartTarget.options.find(x=>x.name===cartSelOpt);stock=o?.quantity||0;}
  else stock=totalQty(cartTarget);
  document.getElementById("cart-stock-label").textContent=`재고 ${stock}개`;
}
window.adjQty=d=>{
  const el=document.getElementById("cart-qty");
  el.value=Math.max(1,parseInt(el.value||1)+d);
};
window.confirmAddToCart=()=>{
  if(!cartTarget)return;
  const qty=parseInt(document.getElementById("cart-qty").value)||1;
  let stock=0;
  if(cartSelOpt&&cartTarget.options){const o=cartTarget.options.find(x=>x.name===cartSelOpt);stock=o?.quantity||0;}
  else stock=totalQty(cartTarget);
  if(qty>stock){showToast(`재고 부족! 현재 ${stock}개`,"#f87171");return;}
  const key=cartTarget.id+(cartSelOpt||"");
  const existing=cart.find(c=>c.key===key);
  if(existing)existing.qty+=qty;
  else cart.push({key,itemId:cartTarget.id,itemName:cartTarget.name,optName:cartSelOpt,collection:cartTarget.collection,qty,unit:cartTarget.unit||"개"});
  closeModal("cart-modal");
  updateCartBadge();
  showToast(`🛒 ${cartTarget.name}${cartSelOpt?` [${cartSelOpt}]`:""} ${qty}개 담았어요`);
};

function updateCartBadge(){
  const total=cart.reduce((a,c)=>a+c.qty,0);
  const badge=document.getElementById("cart-badge");
  if(total>0){badge.style.display="flex";badge.textContent=total;}

}

    </div>`).join("")

      <span style="color:#475569">총 수량</span><span style="font-weight:800;color:#6366f1">${total}개</span></div>`;

window.confirmOrder=async()=>{
  const storeName=document.getElementById("store-name").value.trim();
  if(!storeName){showToast("매장명을 입력해주세요","#f87171");return;}
  // 재고 즉시 차감
  for(const c of cart){
    const item=items.find(i=>i.id===c.itemId);if(!item)continue;
    const clone=JSON.parse(JSON.stringify(item));
    if(c.optName&&clone.options){
      const o=clone.options.find(x=>x.name===c.optName);
      if(o)o.quantity=Math.max(0,(o.quantity||0)-c.qty);
    }else{clone.quantity=Math.max(0,(clone.quantity||0)-c.qty);}
    try{await setDoc(doc(collection(db,"items"),item.id),clone);}catch(e){}
  }
  // 발주 저장
  try{
    await addDoc(collection(db,"orders"),{
      storeName,status:"준비중",
      weekLabel:getWeekLabel(new Date().toISOString()),
      createdAt:serverTimestamp(),
      date:todayDate(),time:nowTime(),
      items:cart.map(c=>({itemId:c.itemId,itemName:c.itemName,optName:c.optName||null,collection:c.collection,qty:c.qty,unit:c.unit}))
    });
  }catch(e){showToast("저장 오류: "+e.message,"#f87171");return;}
  cart=[];updateCartBadge();
  closeModal("checkout-modal");
  showToast("🚀 발주 완료! 재고가 차감됐어요.");
  switchTab("orders");
};

function renderStock(){
  const total=items.reduce((a,i)=>a+totalQty(i),0);
  const low=items.filter(isLow);
  const years=[...new Set(items.map(i=>String(i.year||"")).filter(Boolean))].sort().reverse();
  const byYear=filterYear==="전체"?items:items.filter(i=>String(i.year||"")==filterYear);
  const colls=[...new Set(byYear.map(i=>i.collection).filter(Boolean))];
  const ac=colls.includes(filterColl)?filterColl:"전체";

  document.getElementById("stock-stats").innerHTML=[
    {l:"전체 상품",v:items.length+"종",c:"#3b82f6"},
    {l:"총 수량",v:total.toLocaleString(),c:"#8b5cf6"},
    {l:"재고 부족",v:low.length+"종",c:low.length>0?"#ef4444":"#6b7280",click:true},
  ].map(s=>`<div class="stat-tile" style="cursor:${s.click?"pointer":"default"}" ${s.click?'onclick="window.toggleLowOnly()"':""}>
    <div class="stat-val" style="color:${s.c}">${s.v}</div>
    <div class="stat-lbl">${s.l}${s.click&&showLowOnly?" ✓":""}</div></div>`).join("");

  document.getElementById("yr-filters").innerHTML=["전체",...years].map(y=>{
    const on=filterYear===y?"on":"";
    return`<button class="fbtn ${on}" onclick="window.setFY('${y}')">${y}</button>`;
  }).join("");
  document.getElementById("cl-filters").innerHTML=["전체",...colls].map(c=>{
    const on=ac===c?"on":"";
    return`<button class="fbtn ${on}" onclick="window.setFC('${c}')">${c}</button>`;
  }).join("");

  const filtered=items.filter(i=>
    (showLowOnly?isLow(i):true)&&
    (filterYear==="전체"||String(i.year||"")==filterYear)&&
    (ac==="전체"||i.collection===ac)
  );
  const grouped={};
  [...filtered].sort((a,b)=>(a._order||0)-(b._order||0)).forEach(item=>{
    const k=[item.year,item.collection].filter(Boolean).join(" - ")||"미분류";
    if(!grouped[k])grouped[k]=[];grouped[k].push(item);
  });

  if(!Object.keys(grouped).length){
    document.getElementById("stock-groups").innerHTML=`<div style="text-align:center;padding:50px;font-size:14px;color:#475569">데이터를 불러오는 중...</div>`;return;
  }

  document.getElementById("stock-groups").innerHTML=Object.entries(grouped).map(([gk,gitems])=>{
    const isCol=collapsedGroups.has(gk);
    const gTotal=gitems.reduce((a,i)=>a+totalQty(i),0);
    const sGk=gk.replace(/'/g,"\\'");
    const cards=gitems.map(item=>{
      const low=isLow(item),qty=totalQty(item),hasOpts=item.options?.length>0;
      const nm=item.name.replace(/'/g,"\\'");
      const optRows=hasOpts?item.options.map(o=>{
        const oLow=(o.quantity||0)<10;
        return`<div class="opt-row">
          <span class="opt-name">${o.name}${o.size?`<span style="display:block;font-size:9px;color:#6366f1;opacity:.8">${o.size}</span>`:""}
          </span>
          ${oLow?`<span style="font-size:9px;flex-shrink:0">🔴</span>`:""}
          <span class="opt-qty" style="color:${oLow?"#ef4444":(isDark?"#e2e8f0":"#111827")};flex-shrink:0">${o.quantity||0}<span class="unit"> ${item.unit||"개"}</span></span>
        </div>`;
      }).join(""):"";
      return`<div class="item-card${low?" low-stock":""}">
        <div class="item-img" onclick="window.openPhoto('${item.id}')" style="cursor:pointer">
          ${item.imageUrl?`<img src="${item.imageUrl}" alt="${item.name}">`:`<span style="opacity:.15">📷</span>`}
          ${low?`<div class="low-mask"></div>`:""}
        </div>
        <div class="item-body">
          <div class="item-name">${item.name}</div>
          ${item.material?`<div class="item-sub">${item.material}</div>`:""}
          ${item.size?`<div class="item-sub" style="color:#6366f1;opacity:.85">${item.size}</div>`:""}
          <div class="item-qty" style="color:${low?"#ef4444":(isDark?"#e2e8f0":"#111827")}">${qty}<span class="unit"> ${item.unit||"개"}</span></div>
        </div>
        ${hasOpts
          ?`<div class="opts-panel">${item.options.map(o=>{
              const oLow=(o.quantity||0)<10;
              const on=o.name.replace(/'/g,"\'");
              return`<div class="opt-row">
                <span class="opt-name">${o.name}${o.size?`<br><span style="font-size:9px;color:#6366f1;opacity:.8">${o.size}</span>`:""}</span>
                ${oLow?`<span style="font-size:9px;flex-shrink:0">🔴</span>`:""}
                <span class="opt-qty" style="color:${oLow?"#ef4444":(isDark?"#e2e8f0":"#111827")};flex-shrink:0">${o.quantity||0}<span class="unit"> ${item.unit||"개"}</span></span>
                <button onclick="window.openQtyModal('${item.id}','${on}','${nm}',${o.quantity||0})" style="padding:2px 7px;border-radius:5px;font-size:9px;font-weight:700;background:rgba(99,102,241,0.15);border:1px solid rgba(99,102,241,0.3);color:#a5b4fc;flex-shrink:0;cursor:pointer">수정</button>
              </div>`;}).join("")}</div>`
          :`<div class="card-actions"><button onclick="window.openQtyModal('${item.id}',null,'${nm}',${qty})" style="width:100%;padding:6px 0;border-radius:7px;font-size:10px;font-weight:700;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);color:#64748b;cursor:pointer">수량 수정</button></div>`}
      </div>`;
    }).join("");
    return`<div class="collection-group">
      <div class="coll-header${isCol?" collapsed":""}" onclick="window.toggleGroup('${sGk}')">
        <span>${isCol?"📁":"🗂️"}</span>
        <span style="color:${isDark?"#a5b4fc":"#4f46e5"}">${gk}</span>
        <span style="margin-left:auto;font-size:10px;color:#6366f1">${gitems.length}종 · ${gTotal.toLocaleString()}개</span>
        <span style="font-size:11px;color:${isDark?"#475569":"#9ca3af"}">${isCol?"▶":"▼"}</span>
      </div>
      ${!isCol?`<div class="items-wrap"><div class="item-grid">${cards}</div></div>`:""}
    </div>`;
  }).join("");
}

          <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
            <div style="font-weight:700;font-size:14px;flex:1">${order.storeName}</div>
<select onchange="window.changeStatus('${order.id}',this.value)" style="padding:4px 10px;border-radius:99px;font-size:11px;font-weight:600;cursor:pointer;outline:none;font-family:inherit;border:1px solid ${order.status==="출고완료"?"rgba(52,211,153,0.3)":"rgba(251,191,36,0.3)"};background:${order.status==="출고완료"?"rgba(52,211,153,0.15)":"rgba(251,191,36,0.15)"};color:${order.status==="출고완료"?"#34d399":"#fbbf24"}">
              <option value="준비중" ${order.status==="준비중"?"selected":""}>🔄 준비중</option>
              <option value="출고완료" ${order.status==="출고완료"?"selected":""}>✅ 출고완료</option>
            </select>
            <div style="font-size:10px;color:${isDark?"#475569":"#9ca3af"}">${order.date||""}</div>
          </div>
          <div style="display:flex;flex-wrap:wrap;gap:4px">
            ${order.items.map(it=>`
            <div class="item-chip">
              <span style="font-size:9px;color:#6366f1;font-weight:600;margin-right:2px">${it.collection}</span>
              ${it.itemName}${it.optName?` [${it.optName}]`:""}
              <strong style="color:${isDark?"#e2e8f0":"#111827"};margin-left:3px">${it.qty}${it.unit}</strong>
            </div>`).join("")}
          </div>
        </div>`).join("")}
      </div>
    </div>`).join("");
}
</script>
</body>
</html>
