<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getFirestore,collection,doc,setDoc,addDoc,deleteDoc,onSnapshot,query,orderBy,serverTimestamp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const db=getFirestore(initializeApp({
  apiKey:"AIzaSyBHWNK9K1Ack5-Sj02PAuVbCu2gcOSnpMY",
  authDomain:"gm-stock-management.firebaseapp.com",
  projectId:"gm-stock-management",
  storageBucket:"gm-stock-management.firebasestorage.app",
  messagingSenderId:"590013505498",
  appId:"1:590013505498:web:59343cee0d152ee97c6ae3"
}));

let items=[],orders=[],cart=[];
let filterYear="전체",filterColl="전체";
let collapsedGroups=new Set();
let collapsedWeeks=new Set();
let collapsedMonths=new Set();
let collapsedYears=new Set();
let showLowOnly=false,isDark=true;
let cartTarget=null,cartSelOpt=null;

function isSet(i){return i.name&&i.name.toUpperCase().includes("SET");}
function totalQty(i){
  if(!i.options?.length)return i.quantity||0;
  if(isSet(i))return Math.min(...i.options.map(o=>o.quantity||0));
  return i.options.reduce((a,o)=>a+(o.quantity||0),0);
}
function isLow(i){return totalQty(i)<10;}
function getWeekLabel(dateStr){
  const d=new Date(dateStr);
  const day=d.getDay(); // 0=일,1=월,...,6=토
  // 토(6),일(0)은 다음 주 월요일로 집계
  const mon=new Date(d);
  if(day===0) mon.setDate(d.getDate()+1);       // 일→다음월
  else if(day===6) mon.setDate(d.getDate()+2);  // 토→다음월
  else mon.setDate(d.getDate()-(day-1));         // 월~금→이번주월
  const fri=new Date(mon);fri.setDate(mon.getDate()+4);
  const fmt=dt=>`${dt.getMonth()+1}/${dt.getDate()}`;
  const days=["일","월","화","수","목","금","토"];
  return `${fmt(mon)}(${days[mon.getDay()]})~${fmt(fri)}(${days[fri.getDay()]})`;
}
function nowTime(){return new Date().toLocaleTimeString("ko-KR",{hour:"2-digit",minute:"2-digit"});}
function todayDate(){return new Date().toISOString().slice(0,10);}

function showToast(msg,color="#34d399"){
  const t=document.getElementById("toast");
  t.textContent=msg;t.style.color=color;t.style.display="block";
  clearTimeout(t._tid);t._tid=setTimeout(()=>t.style.display="none",2500);
}

window.toggleTheme=()=>{
  isDark=!isDark;
  document.body.className=isDark?"dark":"light";
  document.getElementById("theme-knob").textContent=isDark?"🌙":"☀️";
  renderStock();renderOrders();
};

window.switchTab=t=>{
  ["stock","cart","orders"].forEach(id=>{
    document.getElementById("tab-"+id).classList.remove("active");
    document.getElementById("nav-"+id).classList.remove("active");
  });
  document.getElementById("tab-"+t).classList.add("active");

window.openCartModal=(itemId)=>{

function renderCartOptWrap(){
  const wrap=document.getElementById("cart-opt-wrap");
  if(!cartTarget?.options?.length){wrap.innerHTML="";return;}
  wrap.innerHTML=`<div class="field-label" style="margin-bottom:8px">옵션 선택</div><div style="display:flex;flex-wrap:wrap;gap:4px">`
    +cartTarget.options.map(o=>`<button class="opt-sel-btn${cartSelOpt===o.name?" sel":""}" onclick="selOpt('${o.name.replace(/'/g,"\\'")}')">
      ${o.name}<span style="font-size:10px;opacity:.7;margin-left:4px">${o.quantity||0}개</span>
    </button>`).join("")+`</div>`;
}
window.selOpt=name=>{cartSelOpt=name;renderCartOptWrap();updateStockLabel();};
function updateStockLabel(){
  if(!cartTarget)return;
  let stock=0;
  if(cartSelOpt&&cartTarget.options){const o=cartTarget.options.find(x=>x.name===cartSelOpt);stock=o?.quantity||0;}
  else stock=totalQty(cartTarget);
  document.getElementById("cart-stock-label").textContent=`재고 ${stock}개`;
}
window.adjQty=d=>{
  const el=document.getElementById("cart-qty");
  el.value=Math.max(1,parseInt(el.value||1)+d);
};
window.confirmAddToCart=()=>{
  if(!cartTarget)return;
  const qty=parseInt(document.getElementById("cart-qty").value)||1;
  let stock=0;
  if(cartSelOpt&&cartTarget.options){const o=cartTarget.options.find(x=>x.name===cartSelOpt);stock=o?.quantity||0;}
  else stock=totalQty(cartTarget);
  if(qty>stock){showToast(`재고 부족! 현재 ${stock}개`,"#f87171");return;}
  const key=cartTarget.id+(cartSelOpt||"");
  const existing=cart.find(c=>c.key===key);
  if(existing)existing.qty+=qty;
  else cart.push({key,itemId:cartTarget.id,itemName:cartTarget.name,optName:cartSelOpt,collection:cartTarget.collection,qty,unit:cartTarget.unit||"개"});
  closeModal("cart-modal");
  updateCartBadge();
  showToast(`🛒 ${cartTarget.name}${cartSelOpt?` [${cartSelOpt}]`:""} ${qty}개 담았어요`);
};

function updateCartBadge(){
  const total=cart.reduce((a,c)=>a+c.qty,0);
  const badge=document.getElementById("cart-badge");
  if(total>0){badge.style.display="flex";badge.textContent=total;}
  else badge.style.display="none";
}

      <span style="color:#475569">총 수량</span><span style="font-weight:800;color:#6366f1">${total}개</span></div>`;
  document.getElementById("store-name").value="";
  document.getElementById("checkout-modal").style.display="flex";

window.confirmOrder=async()=>{
  const storeName=document.getElementById("store-name").value.trim();
  if(!storeName){showToast("매장명을 입력해주세요","#f87171");return;}
  // 재고 즉시 차감
  for(const c of cart){
    const item=items.find(i=>i.id===c.itemId);if(!item)continue;
    const clone=JSON.parse(JSON.stringify(item));
    if(c.optName&&clone.options){
      const o=clone.options.find(x=>x.name===c.optName);
      if(o)o.quantity=Math.max(0,(o.quantity||0)-c.qty);
    }else{clone.quantity=Math.max(0,(clone.quantity||0)-c.qty);}
    try{await setDoc(doc(collection(db,"items"),item.id),clone);}catch(e){}
  }
  // 발주 저장
  try{
    await addDoc(collection(db,"orders"),{
      storeName,status:"준비중",
      weekLabel:getWeekLabel(new Date().toISOString()),
      createdAt:serverTimestamp(),
      date:todayDate(),time:nowTime(),
      items:cart.map(c=>({itemId:c.itemId,itemName:c.itemName,optName:c.optName||null,collection:c.collection,qty:c.qty,unit:c.unit}))
    });
  }catch(e){showToast("저장 오류: "+e.message,"#f87171");return;}
  cart=[];updateCartBadge();
  closeModal("checkout-modal");
  showToast("🚀 발주 완료! 재고가 차감됐어요.");
  switchTab("orders");
};

// ── 렌더 재고 ──
function renderStock(){
  const total=items.reduce((a,i)=>a+totalQty(i),0);
  const low=items.filter(isLow);
  const years=[...new Set(items.map(i=>String(i.year||"")).filter(Boolean))].sort().reverse();
  const byYear=filterYear==="전체"?items:items.filter(i=>String(i.year||"")==filterYear);
  const colls=[...new Set(byYear.map(i=>i.collection).filter(Boolean))];
  const ac=colls.includes(filterColl)?filterColl:"전체";

  document.getElementById("stock-stats").innerHTML=[
    {l:"전체 상품",v:items.length+"종",c:"#3b82f6"},
    {l:"총 수량",v:total.toLocaleString(),c:"#8b5cf6"},
    {l:"재고 부족",v:low.length+"종",c:low.length>0?"#ef4444":"#6b7280",click:true},
  ].map(s=>`<div class="stat-tile" style="cursor:${s.click?"pointer":"default"}" ${s.click?'onclick="window.toggleLowOnly()"':""}>
    <div class="stat-val" style="color:${s.c}">${s.v}</div>
    <div class="stat-lbl">${s.l}${s.click&&showLowOnly?" ✓":""}</div></div>`).join("");

  document.getElementById("yr-filters").innerHTML=["전체",...years].map(y=>{
    const on=filterYear===y?"on":"";
    return`<button class="fbtn ${on}" onclick="window.setFY('${y}')">${y}</button>`;
  }).join("");
  document.getElementById("cl-filters").innerHTML=["전체",...colls].map(c=>{
    const on=ac===c?"on":"";
    return`<button class="fbtn ${on}" onclick="window.setFC('${c}')">${c}</button>`;
  }).join("");

  const filtered=items.filter(i=>
    (showLowOnly?isLow(i):true)&&
    (filterYear==="전체"||String(i.year||"")==filterYear)&&
    (ac==="전체"||i.collection===ac)
  );
  const grouped={};
  [...filtered].sort((a,b)=>(a._order||0)-(b._order||0)).forEach(item=>{
    const k=[item.year,item.collection].filter(Boolean).join(" - ")||"미분류";
    if(!grouped[k])grouped[k]=[];grouped[k].push(item);
  });

  if(!Object.keys(grouped).length){
    document.getElementById("stock-groups").innerHTML=`<div style="text-align:center;padding:50px;font-size:14px;color:#475569">데이터를 불러오는 중...</div>`;return;
  }

  document.getElementById("stock-groups").innerHTML=Object.entries(grouped).map(([gk,gitems])=>{
    const isCol=collapsedGroups.has(gk);
    const gTotal=gitems.reduce((a,i)=>a+totalQty(i),0);
    const sGk=gk.replace(/'/g,"\\'");
    const cards=gitems.map(item=>{
      const low=isLow(item),qty=totalQty(item),hasOpts=item.options?.length>0;
      const nm=item.name.replace(/'/g,"\\'");
      const optRows=hasOpts?item.options.map(o=>{
        const oLow=(o.quantity||0)<10;
        return`<div class="opt-row">
          <span class="opt-name">${o.name}${o.size?`<span style="display:block;font-size:9px;color:#6366f1;opacity:.8">${o.size}</span>`:""}
          </span>
          ${oLow?`<span style="font-size:9px;flex-shrink:0">🔴</span>`:""}
          <span class="opt-qty" style="color:${oLow?"#ef4444":(isDark?"#e2e8f0":"#111827")};flex-shrink:0">${o.quantity||0}<span class="unit"> ${item.unit||"개"}</span></span>
        </div>`;
      }).join(""):"";
      return`<div class="item-card${low?" low-stock":""}">
        <div class="item-img" onclick="window.openPhoto('${item.id}')" style="cursor:pointer">
          ${item.imageUrl?`<img src="${item.imageUrl}" alt="${item.name}">`:`<span style="opacity:.15">📷</span>`}
          ${low?`<div class="low-mask"></div>`:""}
        </div>
        <div class="item-body">
          <div class="item-name" style="display:flex;align-items:center;gap:4px">
            ${item.name}
            <button onclick="window.openItemNameModal('${item.id}','${nm}')" style="padding:1px 5px;border-radius:4px;font-size:9px;background:rgba(99,102,241,0.1);border:1px solid rgba(99,102,241,0.2);color:#a5b4fc;cursor:pointer;flex-shrink:0">✏️</button>
          </div>
          ${item.material?`<div class="item-sub">${item.material}</div>`:""}
          ${item.size?`<div class="item-sub" style="color:#6366f1;opacity:.85">${item.size}</div>`:""}
          <div class="item-qty" style="color:${low?"#ef4444":(isDark?"#e2e8f0":"#111827")}">${qty}<span class="unit"> ${item.unit||"개"}</span></div>
        </div>
        ${hasOpts
          ?`<div class="opts-panel">${item.options.map(o=>{
              const oLow=(o.quantity||0)<10;
              const on=o.name.replace(/'/g,"\'");
              return`<div class="opt-row">
                <span class="opt-name">${o.name}${o.size?`<br><span style="font-size:9px;color:#6366f1;opacity:.8">${o.size}</span>`:""}</span>
                ${oLow?`<span style="font-size:9px;flex-shrink:0">🔴</span>`:""}
                <span class="opt-qty" style="color:${oLow?"#ef4444":(isDark?"#e2e8f0":"#111827")};flex-shrink:0">${o.quantity||0}<span class="unit"> ${item.unit||"개"}</span></span>
                <button onclick="window.openQtyModal('${item.id}','${on}','${nm}',${o.quantity||0})" style="padding:2px 7px;border-radius:5px;font-size:9px;font-weight:700;background:rgba(99,102,241,0.15);border:1px solid rgba(99,102,241,0.3);color:#a5b4fc;flex-shrink:0;cursor:pointer">수정</button>
              </div>`;}).join("")}</div>`
          :`<div class="card-actions"><button onclick="window.openQtyModal('${item.id}',null,'${nm}',${qty})" style="width:100%;padding:6px 0;border-radius:7px;font-size:10px;font-weight:700;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);color:#64748b;cursor:pointer">수량 수정</button></div>`}
      </div>`;
    }).join("");
    return`<div class="collection-group">
      <div class="coll-header${isCol?" collapsed":""}" onclick="window.toggleGroup('${sGk}')">
        <span>${isCol?"📁":"🗂️"}</span>
        <span style="color:${isDark?"#a5b4fc":"#4f46e5"}">${gk}</span>
        <span style="margin-left:auto;font-size:10px;color:#6366f1">${gitems.length}종 · ${gTotal.toLocaleString()}개</span>
        <span style="font-size:11px;color:${isDark?"#475569":"#9ca3af"}">${isCol?"▶":"▼"}</span>
      </div>
      ${!isCol?`<div class="items-wrap"><div class="item-grid">${cards}</div></div>`:""}
    </div>`;
  }).join("");
}

// 구글 시트 기록
async function logToSheet(order){
  try{
    const now=new Date();
    const date=now.toLocaleDateString("ko-KR",{year:"numeric",month:"2-digit",day:"2-digit"});
    const time=now.toLocaleTimeString("ko-KR",{hour:"2-digit",minute:"2-digit"});
    const payload={
      date,time,
      storeName:order.storeName||"",
      reason:order.reason||"",
      handler:order.handler||"",
      status:order.status||"출고완료",
      items:(order.items||[]).map(it=>({
        collection:it.collection||"",
        itemName:it.itemName||"",
        optName:it.optName||"",
        qty:it.qty||0,
        unit:it.unit||"개"
      }))
    };
    // GET 방식으로 전송 (CORS 문제 없음)
    const url=SHEET_URL+"?data="+encodeURIComponent(JSON.stringify(payload));
    const res=await fetch(url,{method:"GET",mode:"cors"});
    const result=await res.json();
    console.log("시트 기록 완료:", result);
  }catch(e){
    console.error("시트 기록 오류:", e.message);
  }
}

window.confirmCancel=async(orderId)=>{
  const reason=document.getElementById("cancel-reason")?.value.trim();
  if(!reason){showToast("취소 사유를 입력해주세요","#f87171");return;}
  const order=orders.find(o=>o.id===orderId);if(!order)return;
  // 출고완료 건은 이미 출고됐으므로 재고 복원 안 함
  // 검토중/승인/준비중 건만 복원 (발주 시 차감됐으므로)
  const cancelableStatuses = ["검토중","승인","준비중","반려"];
  if(cancelableStatuses.includes(order.status)){
    for(const it of order.items){
      const item=items.find(i=>i.id===it.itemId);if(!item)continue;
      const clone=JSON.parse(JSON.stringify(item));
      if(it.optName&&clone.options){const o=clone.options.find(x=>x.name===it.optName);if(o)o.quantity=(o.quantity||0)+it.qty;}
      else clone.quantity=(clone.quantity||0)+it.qty;
      try{await setDoc(doc(collection(db,"items"),item.id),clone);}catch(e){}
    }
  }
  try{
    await setDoc(doc(collection(db,"orders"),orderId),{...order,status:"취소",cancelReason:reason,canceledAt:new Date().toISOString()});
    document.getElementById("cancel-modal")?.remove();
    showToast("🚫 취소됐어요. 재고가 복원됐어요.");
  }catch(e){showToast("오류: "+e.message,"#f87171");}
};

// ── 렌더 출고요청 ──
function renderOrders(){
  const currentWeek=getWeekLabel(new Date().toISOString());
  const now=new Date();
  const currentMonthKey=`${now.getFullYear()}-${now.getMonth()+1}`;
  const currentYearKey=`${now.getFullYear()}`;

  // 주차별 그룹
  const weekGrouped={};
  orders.forEach(o=>{
    const lbl=o.weekLabel||getWeekLabel(o.date||new Date().toISOString());
    if(!weekGrouped[lbl])weekGrouped[lbl]=[];
    weekGrouped[lbl].push(o);
  });

  // 월별 그룹 (주차 묶기)
  const monthGrouped={};
  Object.entries(weekGrouped).forEach(([week,wOrders])=>{
    // 주차 레이블에서 월 추출 (예: 7/8(월)~7/12(금) → 2026-7)
    const match=week.match(/(\d+)\/(\d+)/);
    const d=match?new Date(now.getFullYear(),parseInt(match[1])-1,parseInt(match[2])):now;
    const mKey=`${d.getFullYear()}-${d.getMonth()+1}`;
    const mLabel=`${d.getFullYear()}년 ${d.getMonth()+1}월`;
    if(!monthGrouped[mKey])monthGrouped[mKey]={label:mLabel,weeks:{}};
    monthGrouped[mKey].weeks[week]=wOrders;
  });

  // 연별 그룹
  const yearGrouped={};
  Object.entries(monthGrouped).forEach(([mKey,mData])=>{
    const yKey=mKey.split("-")[0];
    const yLabel=`${yKey}년`;
    if(!yearGrouped[yKey])yearGrouped[yKey]={label:yLabel,months:{}};
    yearGrouped[yKey].months[mKey]=mData;
  });

  // 자동 접기 (최초 1회)
  if(!collapsedWeeks.has("__init__")){
    Object.keys(weekGrouped).forEach(week=>{
      if(week!==currentWeek) collapsedWeeks.add(week.replace(/[/]/g,"_"));
    });
    Object.keys(monthGrouped).forEach(mKey=>{
      if(mKey!==currentMonthKey) collapsedMonths.add(mKey);
    });
    Object.keys(yearGrouped).forEach(yKey=>{
      if(yKey!==currentYearKey) collapsedYears.add(yKey);
    });
    collapsedWeeks.add("__init__");
  }

  const el=document.getElementById("orders-list");
  if(!Object.keys(grouped).length){
    el.innerHTML=`<div style="text-align:center;padding:60px 20px;font-size:14px;color:#475569">출고 요청 내역이 없어요</div>`;return;
  }
  // grouped → yearGrouped로 그룹핑
  const weekGrouped2={};
  Object.entries(grouped).forEach(([week,wOrders])=>weekGrouped2[week]=wOrders);
  const monthGrouped={};
  Object.entries(weekGrouped2).forEach(([week,wOrders])=>{
    const parts=week.match(/(\d+)\/(\d+)/);
    const d=parts?new Date(new Date().getFullYear(),parseInt(parts[1])-1,parseInt(parts[2])):new Date();
    const mKey=d.getFullYear()+"-"+(d.getMonth()+1);
    const mLabel=d.getFullYear()+"년 "+(d.getMonth()+1)+"월";
    if(!monthGrouped[mKey])monthGrouped[mKey]={label:mLabel,weeks:{}};
    monthGrouped[mKey].weeks[week]=wOrders;
  });
  const yearGrouped={};
  Object.entries(monthGrouped).forEach(([mKey,mData])=>{
    const yKey=mKey.split("-")[0];
    if(!yearGrouped[yKey])yearGrouped[yKey]={label:yKey+"년",months:{}};
    yearGrouped[yKey].months[mKey]=mData;
  });

  el.innerHTML=banner+Object.entries(yearGrouped).map(([yKey,yData])=>{
    const yCol=collapsedYears.has(yKey);
    const yTotal=Object.values(yData.months).reduce((a,m)=>Object.values(m.weeks).reduce((b,w)=>b+w.length,0)+a,0);
    return `<div style="margin-bottom:8px">
      <div onclick="window.toggleYear('${yKey}')" style="display:flex;align-items:center;gap:8px;padding:8px 14px;border-radius:8px;cursor:pointer;margin-bottom:4px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06)">
        <span>${yCol?"📁":"📂"}</span>
        <span style="font-weight:700;font-size:13px">${yData.label}</span>
        <span style="margin-left:auto;font-size:10px;color:#475569">${yTotal}건</span>
        <span style="font-size:11px;color:#475569">${yCol?"▶":"▼"}</span>
      </div>
      ${yCol?"":Object.entries(yData.months).map(([mKey,mData])=>{
        const mCol=collapsedMonths.has(mKey);
        const mTotal=Object.values(mData.weeks).reduce((a,w)=>a+w.length,0);
        return `<div style="margin-left:8px;margin-bottom:6px">
          <div onclick="window.toggleMonth('${mKey}')" style="display:flex;align-items:center;gap:8px;padding:7px 14px;border-radius:8px;cursor:pointer;margin-bottom:4px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.05)">
            <span>${mCol?"🗓️":"📅"}</span>
            <span style="font-weight:600;font-size:12px;color:#94a3b8">${mData.label}</span>
            <span style="margin-left:auto;font-size:10px;color:#475569">${mTotal}건</span>
            <span style="font-size:11px;color:#475569">${mCol?"▶":"▼"}</span>
          </div>
          ${mCol?"":Object.entries(mData.weeks).map(([week,wOrders])=>`
    <div class="week-group" style="margin-left:8px">
      <div class="week-header" onclick="window.toggleWeek('${week.replace(/[/]/g,"_")}')" style="cursor:pointer;border-radius:${collapsedWeeks.has(week.replace(/[/]/g,"_"))?"10px":"10px 10px 0 0"}">
        <span>📅</span><span style="color:#60a5fa">${week}</span>
        <span style="margin-left:auto;font-size:10px;color:#3b82f6">${wOrders.length}건</span>
        <span style="font-size:11px;color:#475569;margin-left:6px">${collapsedWeeks.has(week.replace(/[/]/g,"_"))?"▶":"▼"}</span>
      </div>
      ${collapsedWeeks.has(week.replace(/[/]/g,"_"))?"":(`
      <div style="padding:7px 14px;font-size:11px;font-weight:600;color:#34d399;background:rgba(52,211,153,0.06);border-left:1px solid rgba(52,211,153,0.2);border-right:1px solid rgba(52,211,153,0.2)">
        📦 이 주 주문은 ${(()=>{const p=week.match(/(\d+)\/(\d+)/);if(!p)return "차주 화요일";const m=new Date(new Date().getFullYear(),parseInt(p[1])-1,parseInt(p[2]));const t=new Date(m);t.setDate(m.getDate()+8);return (t.getMonth()+1)+"/"+t.getDate()+"(화)";})()}에 발송 예정이에요
      </div>
      <div class="week-cycle">
        ${[{l:"월~금",d:"주문 접수",c:"#8b5cf6"},{l:"월",d:"준비·택배접수",c:"#3b82f6"},{l:"화",d:"발송",c:"#10b981"}].map(s=>`<div class="cycle-badge"><span style="font-weight:700;color:${s.c};padding:1px 6px;border-radius:99px;background:${s.c}20">${s.l}</span><span style="color:${isDark?"#475569":"#6b7280"};font-size:10px">${s.d}</span></div>`).join("")}
      </div>
      <div class="order-list">
        ${wOrders.map(order=>`
        <div class="order-row">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap">
            <div style="font-weight:700;font-size:14px;flex:1;display:flex;align-items:center;gap:6px">
              ${order.storeName}
              ${order.status!=="취소"?`<button onclick="window.openStoreNameEditModal('${order.id}','${order.storeName.replace(/'/g,"\'")}')" style="padding:2px 7px;border-radius:5px;font-size:9px;font-weight:700;background:rgba(99,102,241,0.12);border:1px solid rgba(99,102,241,0.25);color:#a5b4fc;cursor:pointer;flex-shrink:0">✏️</button>`:""}
            </div>
            <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
              ${order.status==="취소"
                ?`<div style="display:flex;align-items:center;gap:4px">
                    <span style="padding:3px 10px;border-radius:99px;font-size:11px;font-weight:600;background:rgba(239,68,68,0.15);color:#ef4444;border:1px solid rgba(239,68,68,0.3)">🚫 취소됨</span>
                    <button onclick="window.deleteOrder('${order.id}')" style="padding:4px 10px;border-radius:8px;font-size:11px;font-weight:700;background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.2);color:#f87171;cursor:pointer">🗑️</button>
                  </div>`
                :`<div style="display:flex;align-items:center;gap:4px;flex-wrap:wrap;justify-content:flex-end">
                    ${order.status==="출고완료"?`<span style="padding:3px 10px;border-radius:99px;font-size:11px;font-weight:600;background:rgba(52,211,153,0.15);color:#34d399;border:1px solid rgba(52,211,153,0.3)">✅ 출고완료</span>`
                    :order.status==="반려"?`<span style="padding:3px 10px;border-radius:99px;font-size:11px;font-weight:600;background:rgba(239,68,68,0.15);color:#ef4444;border:1px solid rgba(239,68,68,0.3)">❌ 반려</span>`
                    :order.status==="승인"?`<span style="padding:3px 10px;border-radius:99px;font-size:11px;font-weight:600;background:rgba(59,130,246,0.15);color:#60a5fa;border:1px solid rgba(59,130,246,0.3)">✅ 승인됨</span>`
                    :order.status==="준비중"?`<span style="padding:3px 10px;border-radius:99px;font-size:11px;font-weight:600;background:rgba(251,191,36,0.15);color:#fbbf24;border:1px solid rgba(251,191,36,0.3)">🔄 준비중</span>`
                    :`<span style="padding:3px 10px;border-radius:99px;font-size:11px;font-weight:600;background:rgba(139,92,246,0.15);color:#a78bfa;border:1px solid rgba(139,92,246,0.3)">🔍 검토중</span>`}
                    ${order.status!=="출고완료"?`<button onclick="window.openApproveModal('${order.id}')" style="padding:4px 10px;border-radius:8px;font-size:11px;font-weight:700;background:rgba(52,211,153,0.15);border:1px solid rgba(52,211,153,0.3);color:#34d399;cursor:pointer">${order.status==="승인"||order.status==="준비중"?"✅ 출고완료":"✅ 승인"}</button>`:""}
                    ${order.status==="출고완료"?`<button onclick="window.setStatus('${order.id}','승인')" style="padding:4px 10px;border-radius:8px;font-size:11px;font-weight:700;background:rgba(59,130,246,0.1);border:1px solid rgba(59,130,246,0.25);color:#60a5fa;cursor:pointer">↩️ 승인으로</button>`:""}
                    ${order.status!=="반려"&&order.status!=="출고완료"?`<button onclick="window.openRejectModal('${order.id}')" style="padding:4px 10px;border-radius:8px;font-size:11px;font-weight:700;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.25);color:#f87171;cursor:pointer">❌ 반려</button>`:""}
                    ${order.status==="반려"?`<button onclick="window.openApproveModal('${order.id}')" style="padding:4px 10px;border-radius:8px;font-size:11px;font-weight:700;background:rgba(52,211,153,0.15);border:1px solid rgba(52,211,153,0.3);color:#34d399;cursor:pointer">✅ 승인</button>`:""}
                    <button onclick="window.openCancelModal('${order.id}')" style="padding:4px 10px;border-radius:8px;font-size:11px;font-weight:700;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);color:#64748b;cursor:pointer">취소</button>
                    <button onclick="window.deleteOrder('${order.id}')" style="padding:4px 10px;border-radius:8px;font-size:11px;font-weight:700;background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.2);color:#f87171;cursor:pointer">🗑️</button>
                  </div>`}
              <div style="font-size:10px;color:${isDark?"#475569":"#9ca3af"};text-align:right">
                ${order.date||""}
                ${order.handler?`<div style="font-weight:600;color:#6366f1;margin-top:1px">${order.handler}</div>`:""}
              </div>
            </div>
          </div>
          ${order.reason?`<div style="font-size:11px;padding:6px 10px;border-radius:7px;background:rgba(99,102,241,0.06);border:1px solid rgba(99,102,241,0.15);color:#a5b4fc;margin-bottom:6px">📝 요청 사유: ${order.reason}</div>`:""}
          ${order.photos?.length?`<div style="margin-bottom:6px"><button onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'flex':'none';this.textContent=this.textContent.includes('보기')?'📷 사진 접기':'📷 사진 보기 ('+order.photos.length+'장)'" style="padding:3px 10px;border-radius:6px;font-size:11px;font-weight:600;background:rgba(99,102,241,0.1);border:1px solid rgba(99,102,241,0.2);color:#a5b4fc;cursor:pointer;margin-bottom:6px">📷 사진 보기 (${order.photos.length}장)</button><div style="display:none;gap:6px;flex-wrap:wrap">${order.photos.map(p=>`<img src="${p}" style="width:72px;height:72px;object-fit:cover;border-radius:8px;border:1px solid rgba(255,255,255,0.12);cursor:zoom-in" onclick="window.viewPhoto('${p}')">`).join("")}</div></div>`:""}
          ${order.status==="취소"&&order.cancelReason?`<div style="font-size:11px;padding:6px 10px;border-radius:7px;background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.2);color:#f87171;margin-bottom:6px">취소 사유: ${order.cancelReason}</div>`:""}
          ${order.status==="반려"&&order.rejectReason?`<div style="font-size:11px;padding:6px 10px;border-radius:7px;background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.2);color:#f87171;margin-bottom:6px">반려 사유: ${order.rejectReason}</div>`:""}
          <div style="display:flex;flex-wrap:wrap;gap:4px">
            ${order.items.map(it=>`<div class="item-chip"><span style="font-size:9px;color:#6366f1;font-weight:600;margin-right:2px">${it.collection}</span>${it.itemName}${it.optName?` [${it.optName}]`:""}<strong style="color:${isDark?"#e2e8f0":"#111827"};margin-left:3px">${it.qty}${it.unit}</strong></div>`).join("")}
          </div>
        </div>`).join("")}
      </div>`)}
    </div>`).join("")}
        </div>`;
      }).join("")}
    </div>`;
  }).join("");
}
}

// 관리자: 출고요청 삭제
window.deleteOrder=async(orderId)=>{
  if(!confirm("이 출고요청을 완전히 삭제할까요?\n삭제하면 되돌릴 수 없어요."))return;
  try{
    await deleteDoc(doc(collection(db,"orders"),orderId));
    showToast("🗑️ 삭제됐어요.");
  }catch(e){showToast("오류: "+e.message,"#f87171");}
};

window.toggleYear=yk=>{if(collapsedYears.has(yk))collapsedYears.delete(yk);else collapsedYears.add(yk);renderOrders();};
window.toggleMonth=mk=>{if(collapsedMonths.has(mk))collapsedMonths.delete(mk);else collapsedMonths.add(mk);renderOrders();};
window.toggleWeek=wk=>{
  if(collapsedWeeks.has(wk))collapsedWeeks.delete(wk);
  else collapsedWeeks.add(wk);
  renderOrders();
};

function getCurrentWeekLabel(){
  return getWeekLabel(new Date().toISOString());
}
</script>
</body>
</html>
